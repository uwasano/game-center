  init(data){ this.data2 = data; }
  async create(){
    this.cameras.main.setBackgroundColor('#0a0a1a');
    drawAtmosphere(this);
    spawnSmoke(this);

    const { score, scores, perfectBonus } = this.data2;

    // Title
    this.add.text(W/2, 80, 'ROUND', {
      fontFamily:'"Press Start 2P", monospace', fontSize:'30px', color:'#FFD700'
    }).setOrigin(0.5).setShadow(0,0,'#FF00FF',16,true,true);
    this.add.text(W/2, 130, 'COMPLETE!', {
      fontFamily:'"Press Start 2P", monospace', fontSize:'30px', color:'#FFD700'
    }).setOrigin(0.5).setShadow(0,0,'#FF00FF',16,true,true);

    // Final score (big)
    this.add.text(W/2, 200, 'FINAL SCORE', {
      fontFamily:'Arial Black', fontSize:'14px', color:'#00FFFF'
    }).setOrigin(0.5);
    const big = this.add.text(W/2, 250, '0', {
      fontFamily:'"Press Start 2P", monospace', fontSize:'56px', color:'#FFD700'
    }).setOrigin(0.5).setShadow(0,0,'#FF00AA',24,true,true);
    // count up
    const obj = { v: 0 };
    this.tweens.add({
      targets: obj, v: score, duration: 1400, ease:'Cubic.easeOut',
      onUpdate: ()=>big.setText(String(Math.floor(obj.v)))
    });

    // Rank message
    let rank = 'NICE TRY!';
    let rankColor = '#fff';
    if(score >= 700){ rank = '🌟 LEGENDARY!! 🌟'; rankColor = '#FFD700'; }
    else if(score >= 500){ rank = '★ AMAZING ★';   rankColor = '#FF00AA'; }
    else if(score >= 350){ rank = '◆ GREAT! ◆';     rankColor = '#00FFFF'; }
    else if(score >= 200){ rank = 'GOOD!';          rankColor = '#39FF14'; }
    this.add.text(W/2, 320, rank, {
      fontFamily:'"Press Start 2P", monospace', fontSize:'18px', color:rankColor
    }).setOrigin(0.5).setShadow(0,0,rankColor,12,true,true);

    // Per-dart breakdown
    this.add.text(W/2, 365, '── DARTS ──', {
      fontFamily:'Arial Black', fontSize:'13px', color:'#888'
    }).setOrigin(0.5);
    const cols = 3, rows = 3;
    for(let i=0;i<scores.length;i++){
      const r = Math.floor(i/cols), c = i%cols;
      const x = W/2 + (c-1)*100;
      const y = 395 + r*30;
      const v = scores[i];
      const col = v>=25?'#FFD700':v>0?'#fff':'#666';
      this.add.text(x, y, '#'+(i+1)+': '+(v>0?'+':'')+v, {
        fontFamily:'Arial Black', fontSize:'14px', color:col
      }).setOrigin(0.5);
    }
    if(perfectBonus){
      this.add.text(W/2, 395+rows*30+10, '+'+perfectBonus+' PERFECT BONUS!', {
        fontFamily:'"Press Start 2P", monospace', fontSize:'14px', color:'#39FF14'
      }).setOrigin(0.5).setShadow(0,0,'#39FF14',10,true,true);
    }

    // Submit & ranking
    this.add.text(W/2, 540, '── WEEKLY RANKING ──', {
      fontFamily:'Arial Black', fontSize:'13px', color:'#FFD700'
    }).setOrigin(0.5);
    const status = this.add.text(W/2, 565, '登録中...', {
      fontFamily:'Arial Black', fontSize:'12px', color:'#00FFFF'
    }).setOrigin(0.5);

    const playerName = getPlayerName() || 'GUEST';
    await submitScore(playerName, score);
    status.setText('✓ 登録完了！');

    const data = await fetchRanking();
    let yPos = 590;
    if(data && data.length > 0){
      data.slice(0,5).forEach((r,i)=>{
        const isMe = (r.player_name === playerName) && (Number(r.coins) === score);
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'  ';
        const name = (r.player_name||'???').slice(0,10);
        const txt = medal+' '+(i+1)+'. '+name+' - '+(r.coins||0)+'pt';
        const t = this.add.text(W/2, yPos, txt, {
          fontFamily:'Arial Black', fontSize:'14px',
          color: isMe?'#FFD700':'#fff'
        }).setOrigin(0.5);
        if(isMe) t.setShadow(0,0,'#FFD700',10,true,true);
        yPos += 26;
      });
    } else {
      this.add.text(W/2, yPos, 'ランキング取得失敗 or 空', {
        fontFamily:'Arial Black', fontSize:'12px', color:'#666'
      }).setOrigin(0.5);
    }

    // Buttons
    this.makeBtn(W/2, H-130, '🎯 もう一度', 0xFF00FF, ()=>{
      Sound.sfx.click(); this.scene.start('Game');
    });
    this.makeBtn(W/2, H-60, '🏠 タイトルに戻る', 0x00FFFF, ()=>{
      Sound.sfx.click(); this.scene.start('Title');
    });

    // Sound toggle
    this.soundBtn = this.add.text(W-50, 20, Sound.isOn()?'🔊':'🔇', {
      fontSize:'32px'
    }).setOrigin(1,0).setInteractive({useHandCursor:true});
    this.soundBtn.on('pointerdown', ()=>{
      const on = Sound.toggle();
      this.soundBtn.setText(on?'🔊':'🔇');
      Sound.sfx.click();
    });

    // Back button (top-left)
    addBackButton(this);
  }
  makeBtn(x,y,text,color,onClick){
    const w=280, h=56;
    const c = this.add.container(x,y);
    const bg = this.add.graphics();
    bg.fillStyle(color,1);
    bg.fillRoundedRect(-w/2,-h/2,w,h,12);
    bg.lineStyle(2,0xFFD700,1);
    bg.strokeRoundedRect(-w/2,-h/2,w,h,12);
    const t = this.add.text(0,0,text,{
      fontFamily:'"Press Start 2P", monospace', fontSize:'14px', color:'#fff',
      stroke:'#000', strokeThickness:2
    }).setOrigin(0.5);
    c.add([bg,t]);
    // Zone-based hit detection
    const hitZone = this.add.zone(x, y, w, h).setOrigin(0.5);
    hitZone.setInteractive({ useHandCursor: true });
    let fired = false;
    hitZone.on('pointerdown',()=>{
      if(fired) return;
      fired = true;
      Sound.ensure();
      Sound.sfx.click();
      c.setScale(0.92);
      onClick();
      this.time.delayedCall(50, ()=>{ c.setScale(1); fired = false; });
    });
    return c;
  }
}

/* ============================================================
   HELPERS - Atmosphere, smoke, dartboard
   ============================================================ */
function drawAtmosphere(scene){
  // gradient overlay
  const g = scene.add.graphics();
  g.fillGradientStyle(0x1a0030, 0x1a0030, 0x0a0a1a, 0x0a0a1a, 1);
  g.fillRect(0,0,W,H);
  g.setDepth(-100);
  // stars
  for(let i=0;i<60;i++){
    const x = Phaser.Math.Between(0,W);
    const y = Phaser.Math.Between(0,H);
    const s = Phaser.Math.FloatBetween(0.5,1.6);
    const c = scene.add.circle(x,y,s, 0xFFFFFF, Phaser.Math.FloatBetween(0.2,0.8));
    c.setDepth(-99);
    scene.tweens.add({ targets:c, alpha:{from:c.alpha,to:c.alpha*0.2}, yoyo:true, repeat:-1, duration:Phaser.Math.Between(1500,3500), delay:Phaser.Math.Between(0,2000) });
  }
}

function spawnSmoke(scene, lessIntense=false){
  const count = lessIntense ? 2 : 4;
  for(let i=0;i<count;i++){
    scene.time.addEvent({
      delay: 600 + i*400, loop: true,
      callback: ()=>{
        const x = Phaser.Math.Between(20, W-20);
        const c = scene.add.circle(x, H+20, Phaser.Math.Between(20,40), 0xFFFFFF, 0.06);
        c.setDepth(-50);
        scene.tweens.add({
          targets: c, y: -50, alpha: 0, scaleX: 2, scaleY: 2,
          duration: Phaser.Math.Between(6000, 10000),
          onComplete: ()=>c.destroy()
        });
      }
    });
  }
}

/**
 * Draws a standard dartboard centered at (cx,cy) with outer radius R.
 * Returns a Phaser.GameObjects.Container that owns the graphics.
 * alpha parameter makes background dartboards faint.
 */
function drawDartboard(scene, cx, cy, R, alphaMul=1){
  const cont = scene.add.container(cx, cy);
  const g = scene.add.graphics();
  cont.add(g);

  // Outer black ring
  g.fillStyle(0x000000, 0.95*alphaMul);
  g.fillCircle(0, 0, R+12);
  g.lineStyle(3, 0x222222, 1*alphaMul);
  g.strokeCircle(0, 0, R+12);

  // Number ring background
  g.fillStyle(0x111111, 1*alphaMul);
  g.fillCircle(0, 0, R);

  // 20 sectors. Sector 0 (top) is 20. Each sector spans 18 degrees.
  // sector i spans from angle (i*18 - 9) to (i*18 + 9), measured from top, clockwise.
  // For drawing arcs, we need the angles from the +x axis (Phaser default: 0 = right, increases clockwise in y-down).
  // top of board = -90deg from +x axis. So sector i covers angle range -90 + i*18 - 9 to -90 + i*18 + 9.

  const tripleInR = R*BOARD.tripleIn;
  const tripleOutR = R*BOARD.tripleOut;
  const doubleInR = R*BOARD.doubleIn;
  const doubleOutR = R*BOARD.doubleOut;

  for(let i=0;i<20;i++){
    const num = DART_NUMBERS[i];
    const startDeg = -90 + i*18 - 9;
    const endDeg = -90 + i*18 + 9;
    const start = Phaser.Math.DegToRad(startDeg);
    const end   = Phaser.Math.DegToRad(endDeg);
    // Light/dark base alternation
    const isEven = i%2===0;
    const baseColor = isEven ? 0xF5DEB3 : 0x2A1A0A; // cream / dark brown
    const tripleColor = isEven ? 0xCC0033 : 0x009933; // red/green
    const doubleColor = isEven ? 0xCC0033 : 0x009933;

    // outer single
    drawArcSlice(g, 0,0, doubleInR, end, start, baseColor, alphaMul);
    // inner single
    drawArcSlice(g, 0,0, tripleInR, end, start, baseColor, alphaMul);
    // mask out inner part - drawArcSlice always fills from 0; second call makes inner brighter
    // We'll instead draw rings:
    // Triple ring
    drawAnnulusSlice(g, 0,0, tripleInR, tripleOutR, start, end, tripleColor, alphaMul);
    // Double ring
    drawAnnulusSlice(g, 0,0, doubleInR, doubleOutR, start, end, doubleColor, alphaMul);
  }

  // Spider (sector dividers) in thin lines
  g.lineStyle(1, 0x333333, 0.6*alphaMul);
  for(let i=0;i<20;i++){
    const a = Phaser.Math.DegToRad(-90 + i*18 + 9);
    g.lineBetween(0,0, Math.cos(a)*R, Math.sin(a)*R);
  }
  // ring borders
  g.lineStyle(1, 0x555555, 0.5*alphaMul);
  g.strokeCircle(0,0, tripleInR);
  g.strokeCircle(0,0, tripleOutR);
  g.strokeCircle(0,0, doubleInR);

  // 25 ring (outer bull)
  g.fillStyle(0x009933, 1*alphaMul);
  g.fillCircle(0,0, R*BOARD.bull25);
  // bullseye (red)
  g.fillStyle(0xCC0033, 1*alphaMul);
  g.fillCircle(0,0, R*BOARD.bullCenter);
  // bull highlight
  g.fillStyle(0xFF6688, 0.6*alphaMul);
  g.fillCircle(-R*0.012, -R*0.012, R*BOARD.bullCenter*0.45);

  // Numbers around
  if(alphaMul > 0.5){
    for(let i=0;i<20;i++){
      const num = DART_NUMBERS[i];
      const a = Phaser.Math.DegToRad(-90 + i*18);
      const tx = Math.cos(a)*(R+24);
      const ty = Math.sin(a)*(R+24);
      const t = scene.add.text(tx, ty, String(num), {
        fontFamily:'"Press Start 2P", monospace', fontSize:'13px',
        color:'#FFD700', stroke:'#000', strokeThickness:2
      }).setOrigin(0.5);
      t.setShadow(0,0,'#FF00FF', 6, true, true);
      cont.add(t);
    }
  }

  // outer glow
  const glow = scene.add.graphics();
  glow.lineStyle(4, 0xFF00FF, 0.5*alphaMul);
  glow.strokeCircle(0,0, R+18);
  glow.lineStyle(2, 0xFFD700, 0.4*alphaMul);
  glow.strokeCircle(0,0, R+25);
  cont.add(glow);

  return cont;
}

function drawArcSlice(g, cx, cy, r, endRad, startRad, color, alphaMul){
  g.fillStyle(color, 1*alphaMul);
  g.beginPath();
  g.moveTo(cx, cy);
  g.arc(cx, cy, r, startRad, endRad, false);
  g.closePath();
  g.fillPath();
}
function drawAnnulusSlice(g, cx, cy, rIn, rOut, startRad, endRad, color, alphaMul){
  g.fillStyle(color, 1*alphaMul);
  g.beginPath();
  // outer arc forward
  const stepCount = 16;
  for(let i=0;i<=stepCount;i++){
    const t = startRad + (endRad-startRad)*(i/stepCount);
    const x = cx + Math.cos(t)*rOut;
    const y = cy + Math.sin(t)*rOut;
    if(i===0) g.moveTo(x,y); else g.lineTo(x,y);
  }
  // inner arc back
  for(let i=stepCount;i>=0;i--){
    const t = startRad + (endRad-startRad)*(i/stepCount);
    const x = cx + Math.cos(t)*rIn;
    const y = cy + Math.sin(t)*rIn;
    g.lineTo(x,y);
  }
  g.closePath();
  g.fillPath();
}

/* ============================================================
   NAME MODAL (HTML overlay)
   ============================================================ */
function showNameModal(onDone){
  const modal = document.getElementById('name-modal');
  const oldInput = document.getElementById('name-input');
  const oldOk = document.getElementById('name-ok');

  const newInput = oldInput.cloneNode(true);
  oldInput.parentNode.replaceChild(newInput, oldInput);
  const newOk = oldOk.cloneNode(true);
  oldOk.parentNode.replaceChild(newOk, oldOk);

  const input = document.getElementById('name-input');
  const ok = document.getElementById('name-ok');

  input.value = '';
  input.value = getPlayerName() || '';
  modal.classList.add('show');
  if(GAME_INSTANCE && GAME_INSTANCE.input) GAME_INSTANCE.input.enabled = false;
  setTimeout(()=>{ input.focus(); input.select(); }, 100);
  const handler = (e)=>{
    if(e) { e.preventDefault(); e.stopPropagation(); }
    const v = (input.value||'').trim().slice(0,12);
    if(!v){ input.focus(); return; }
    setPlayerName(v);
    modal.classList.remove('show');
    input.value = '';
    setTimeout(()=>{
      if(GAME_INSTANCE && GAME_INSTANCE.input) GAME_INSTANCE.input.enabled = true;
    }, 250);
    if(onDone) onDone();
  };
  const keyH = (e)=>{ if(e.key==='Enter'){ e.preventDefault(); handler(); } };
  ok.addEventListener('click', handler);
  input.addEventListener('keydown', keyH);
}

function showPartyNameModal(currentValue, titleText, onDone){
  const modal = document.getElementById('name-modal');
  const oldInput = document.getElementById('name-input');
  const oldOk = document.getElementById('name-ok');
  const titleEl = modal.querySelector('h2');
  const subEl = modal.querySelector('p');
  const prevTitle = titleEl.textContent;
  const prevSub = subEl.textContent;

  // CRITICAL: clone input and ok button to remove ALL prior event listeners
  const newInput = oldInput.cloneNode(true);
  oldInput.parentNode.replaceChild(newInput, oldInput);
  const newOk = oldOk.cloneNode(true);
  oldOk.parentNode.replaceChild(newOk, oldOk);

  const input = document.getElementById('name-input');
  const ok = document.getElementById('name-ok');

  titleEl.textContent = titleText || 'ENTER NAME';
  subEl.textContent = '名前を入力してね（最大12文字）';
  input.value = '';
  input.value = currentValue || '';
  modal.classList.add('show');
  // Disable Phaser input while modal is open (prevents tap-through)
  if(GAME_INSTANCE && GAME_INSTANCE.input) GAME_INSTANCE.input.enabled = false;
  setTimeout(()=>{ input.focus(); input.select(); }, 100);

  const cleanup = ()=>{
    titleEl.textContent = prevTitle;
    subEl.textContent = prevSub;
    modal.classList.remove('show');
    input.value = '';
    // Re-enable Phaser input after a short delay so the closing tap doesn't bleed through
    setTimeout(()=>{
      if(GAME_INSTANCE && GAME_INSTANCE.input) GAME_INSTANCE.input.enabled = true;
    }, 250);
  };
  const handler = (e)=>{
    if(e) { e.preventDefault(); e.stopPropagation(); }
    const v = (input.value||'').trim().slice(0,12);
    if(!v){ input.focus(); return; }
    cleanup();
    if(onDone) onDone(v);
  };
  const keyH = (e)=>{ if(e.key==='Enter'){ e.preventDefault(); handler(); } };
  ok.addEventListener('click', handler);
  input.addEventListener('keydown', keyH);
}

/* ============================================================
   PHASER CONFIG
   ============================================================ */
const config = {
  type: Phaser.AUTO,
  parent: 'game-container',
  width: W, height: H,
  backgroundColor: '#0a0a1a',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: W, height: H,
  },
  scene: [BootScene, TitleScene, PartySetupScene, PartyHandoffScene, GameScene, ResultScene, PartyResultScene],
  render: { antialias: true, pixelArt: false },
};

let GAME_INSTANCE = null;
window.addEventListener('load', ()=>{
  GAME_INSTANCE = new Phaser.Game(config);
  // Pre-initialize audio context (will be in suspended state until user gesture)
  Sound.init();
  // Pre-load speech synthesis voices (async on some browsers)
  if('speechSynthesis' in window){
    try {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = ()=>window.speechSynthesis.getVoices();
    } catch(e){}
  }
  // Document-level early audio unlock: any first touch resumes context immediately
  const unlock = ()=>{
    Sound.ensure();
    Sound.playBgm();
    Sound.unlockSpeech(); // CRITICAL: unlock TTS on iOS within user gesture
    document.removeEventListener('touchstart', unlock, true);
    document.removeEventListener('touchend', unlock, true);
    document.removeEventListener('mousedown', unlock, true);
    document.removeEventListener('click', unlock, true);
    document.removeEventListener('pointerdown', unlock, true);
  };
  document.addEventListener('touchstart', unlock, true);
  document.addEventListener('touchend', unlock, true);
  document.addEventListener('mousedown', unlock, true);
  document.addEventListener('click', unlock, true);
  document.addEventListener('pointerdown', unlock, true);
  // Hide loader after Phaser is ready
  setTimeout(()=>{
    const l = document.getElementById('loader');
    l.style.opacity = '0';
    setTimeout(()=>l.style.display='none', 600);
  }, 800);
});
</script>
