// NAME INPUT OVERLAY (DOM, not Phaser)
// ═══════════════════════════════════════════════════════
function showNameInput(onSubmit, opts){
  opts=opts||{};
  const title=opts.title||'🎮 GAME OVER 🎮';
  const desc=opts.desc||'名前を入力してランキングに登録しよう！<br>（最大8文字）';
  const defaultName=opts.defaultName||'';
  const skipAllowed=opts.skipAllowed!==false;
  const submitLabel=opts.submitLabel||'✅ ランキングに登録';

  // Inject CSS once
  if(!document.getElementById('ni-style')){
    const st=document.createElement('style');
    st.id='ni-style';
    st.textContent=`
      #name-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;align-items:center;justify-content:center;font-family:'Arial Black',sans-serif;}
      #name-box{background:#0a0a1a;border:3px solid #FFD700;border-radius:12px;padding:28px 24px;width:90%;max-width:440px;text-align:center;box-shadow:0 0 40px rgba(255,215,0,.4);}
      #name-box h2{font-size:22px;color:#FFD700;text-shadow:0 0 12px #FFD700;margin-bottom:6px;letter-spacing:2px;}
      #name-box p{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:20px;font-family:Arial,sans-serif;}
      #name-input{width:100%;background:#111;border:2px solid #FFD700;border-radius:8px;padding:12px 16px;font-size:20px;color:#fff;font-family:'Arial Black',sans-serif;letter-spacing:3px;text-align:center;outline:none;box-sizing:border-box;}
      #name-input:focus{border-color:#FF00FF;box-shadow:0 0 16px rgba(255,0,255,.4);}
      #name-submit{margin-top:16px;width:100%;background:#FFD700;border:none;border-radius:8px;padding:14px;font-size:18px;font-family:'Arial Black',sans-serif;color:#000;cursor:pointer;letter-spacing:2px;}
      #name-submit:active{transform:scale(.97);}
      #name-skip{margin-top:10px;background:none;border:none;color:rgba(255,255,255,.35);font-size:12px;font-family:Arial,sans-serif;cursor:pointer;text-decoration:underline;}
    `;
    document.head.appendChild(st);
  }
  const ov=document.createElement('div');
  ov.id='name-overlay';
  ov.innerHTML=`
    <div id="name-box">
      <h2>${title}</h2>
      <p>${desc}</p>
      <input id="name-input" maxlength="8" placeholder="YOUR NAME" autocomplete="off" spellcheck="false" value="${defaultName}">
      <button id="name-submit">${submitLabel}</button>
      ${skipAllowed?'<br><button id="name-skip">スキップ（登録しない）</button>':''}
    </div>
  `;
  document.body.appendChild(ov);
  const inp=document.getElementById('name-input');
  inp.focus();
  if(defaultName)inp.select();
  const submit=()=>{
    const name=(inp.value.trim()||'NONAME').substring(0,8);
    ov.remove();
    onSubmit(name);
  };
  document.getElementById('name-submit').onclick=submit;
  if(skipAllowed){
    document.getElementById('name-skip').onclick=()=>{ov.remove();onSubmit(null);};
  }
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
}

// ═══════════════════════════════════════════════════════
// GAME OVER SCENE
// ═══════════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene{
  constructor(){super('GameOver');}

  create(){
    // ゲームオーバー画面ではゲームUIを完全に隠す
    try{
      const ui=document.getElementById('ui-overlay');
      if(ui)ui.style.display='none';
      const mc=document.getElementById('mobile-controls');
      if(mc)mc.style.display='none';
      const pb=document.getElementById('power-badge');
      if(pb)pb.style.display='none';
      // 隠しコマンド用の pointer-events もリセット
      const stageEl=document.getElementById('stage-badge');
      if(stageEl)stageEl.style.pointerEvents='none';
      const hpEl=document.getElementById('ui-lives-block');
      if(hpEl)hpEl.style.pointerEvents='none';
    }catch(e){}

    // Background
    const g=this.add.graphics();
    g.fillStyle(0);g.fillRect(0,0,W,H);
    for(let y=0;y<H;y++){const t=y/H;const r=Math.floor(20+40*t),b=Math.floor(20+30*t);g.fillStyle((r<<16)|b,.9);g.fillRect(0,y,W,1);}
    for(let i=0;i<50;i++){const s=this.add.image(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),'star').setAlpha(Phaser.Math.FloatBetween(.3,.9));this.tweens.add({targets:s,alpha:.1,duration:Phaser.Math.Between(600,1800),yoyo:true,repeat:-1});}

    const d=gameState.distance.toFixed(1);
    const sd=STAGES[Math.min(gameState.stage,STAGES.length-1)];
    const pc=gameState.powersCollected.length;
    const finalScore=Math.floor(gameState.distance*10)+gameState.score+(pc*200);
    const finalCoins=gameState.coins||0;

    // Result card (top half)
    const go=this.add.text(W/2,44,'GAME OVER',{fontSize:'54px',fontFamily:'Arial Black',color:'#FF2244',stroke:'#000',strokeThickness:7}).setOrigin(.5);
    this.tweens.add({targets:go,scale:{from:.5,to:1},duration:500,ease:'Back.easeOut'});

    const cy=190;
    const card=this.add.graphics();
    card.fillStyle(0,.85);card.fillRoundedRect(W/2-280,cy-80,560,190,12);
    card.lineStyle(3,0xFFD700);card.strokeRoundedRect(W/2-280,cy-80,560,190,12);

    this.add.text(W/2,cy-60,'━━━  RESULT  ━━━',{fontSize:'16px',fontFamily:'Arial Black',color:'#FFD700',letterSpacing:4}).setOrigin(.5);
    const pd=pc>0?gameState.powersCollected.map(p=>POWERUPS[p].emoji).join(' '):'—';
    const rows=[
      {l:'📏 DISTANCE',v:`${d} m`,c:'#FFFFFF'},
      {l:'🎮 STAGE',v:sd.name.split(' — ')[0],c:'#FF00FF'},
      {l:'🪙 COINS',v:`${finalCoins}`,c:'#FFD700'},
      {l:`✨ POWERS (${pc}/10)`,v:pd,c:'#00FFFF'},
      {l:'⭐ SCORE',v:`${finalScore}`,c:'#00FFAA'},
    ];
    rows.forEach((r,i)=>{
      this.add.text(W/2-230,cy-32+i*28,r.l,{fontSize:'14px',fontFamily:'Arial',color:'#AAAAAA'}).setOrigin(0,.5);
      this.add.text(W/2+230,cy-32+i*28,r.v,{fontSize:'17px',fontFamily:'Arial Black',color:r.c}).setOrigin(1,.5);
    });

    let rm='🔥 LEGENDARY RUNNER!',rc='#FFD700';
    if(finalScore<150){rm='💨 BEGINNER BRO';rc='#AAAAAA';}
    else if(finalScore<500){rm='🌿 GETTING STARTED';rc='#00BFFF';}
    else if(finalScore<1500){rm='💜 SHISHA MASTER';rc='#FF00FF';}
    else if(finalScore<3500){rm='⚡ UWASA ELITE';rc='#FFD700';}
    else if(finalScore<7000){rm='🔥 LEGENDARY!';rc='#FFD700';}
    else if(finalScore<15000){rm='🌌 COSMIC GOD 🌌';rc='#FF00FF';}
    else{rm='👑 UWASA OVERLORD 👑';rc='#FF00FF';}
    if(gameState.stage>=29)rm='🏆 STAGE 30 CONQUEROR 🏆';
    this.add.text(W/2,326,rm,{fontSize:'22px',fontFamily:'Arial Black',color:rc,stroke:'#000',strokeThickness:4}).setOrigin(.5);

    // Ranking area (bottom half - populated after name entry)
    this.rankTitle=this.add.text(W/2,360,'🏆 WEEKLY RANKING',{fontSize:'14px',fontFamily:'Arial Black',color:'#FFD700',letterSpacing:2}).setOrigin(.5).setAlpha(0);
    this.rankLines=[];
    for(let i=0;i<5;i++){
      const t=this.add.text(W/2,382+i*22,'',{fontSize:'13px',fontFamily:'Arial',color:'#fff'}).setOrigin(.5).setAlpha(0);
      this.rankLines.push(t);
    }

    // Buttons
    this.retryBtn=this.add.text(W/2-110,502,'🔄  RETRY',{fontSize:'20px',fontFamily:'Arial Black',color:'#000',backgroundColor:'#FFD700',padding:{x:18,y:10}}).setOrigin(.5).setInteractive({useHandCursor:true});
    this.titleBtn=this.add.text(W/2+110,502,'🏠  TITLE',{fontSize:'20px',fontFamily:'Arial Black',color:'#000',backgroundColor:'#00BFFF',padding:{x:18,y:10}}).setOrigin(.5).setInteractive({useHandCursor:true});
    this.retryBtn.on('pointerover',()=>this.retryBtn.setScale(1.08));
    this.retryBtn.on('pointerout',()=>this.retryBtn.setScale(1));
    this.titleBtn.on('pointerover',()=>this.titleBtn.setScale(1.08));
    this.titleBtn.on('pointerout',()=>this.titleBtn.setScale(1));

    const doRetry=()=>{Audio.SFX.click();gameState={distance:0,stage:0,lives:3,score:0,coins:0,powersCollected:[]};Audio.startBGM();this.scene.start('Game');};
    const doTitle=()=>{Audio.SFX.click();this.scene.start('Title');};
    this.retryBtn.on('pointerdown',doRetry);
    this.titleBtn.on('pointerdown',doTitle);
    this.input.keyboard.on('keydown-SPACE',doRetry);

    // タグライン
    this.add.text(W/2,528,'U.wasano Shisha Bar — 片町',{fontSize:'11px',fontFamily:'Arial',color:'#FFD700',fontStyle:'italic'}).setOrigin(.5);

    // 保存された名前で自動送信
    this.time.delayedCall(500,async()=>{
      const savedName=getPlayerName();
      if(savedName){
        // 自動でランキングに登録
        try{
          await sbInsert({
            player_name:savedName,
            coins:finalCoins,
            score:finalScore,
            distance:parseFloat(d),
            stage:gameState.stage,
            powers_collected:pc
          });
        }catch(e){console.warn('Supabase insert failed:',e);}
        this.showRanking(savedName);
      }else{
        // 名前がない場合のみ入力（念のためのフォールバック）
        showNameInput(async(playerName)=>{
          if(playerName){
            setPlayerName(playerName);
            try{
              await sbInsert({
                player_name:playerName,
                coins:finalCoins,
                score:finalScore,
                distance:parseFloat(d),
                stage:gameState.stage,
                powers_collected:pc
              });
            }catch(e){console.warn('Supabase insert failed:',e);}
          }
          this.showRanking(playerName);
        },{
          title:'🎮 GAME OVER',
          desc:'名前を入力してランキングに登録！<br>（最大8文字）',
          submitLabel:'✅ 登録',
          skipAllowed:false
        });
      }
    });
  }

  async showRanking(myName){
    this.rankTitle.setAlpha(1);
    // Try Supabase
    let data=null;
    try{ data=await sbFetchRanking(); }catch(e){}

    if(!data||!data.length){
      // Offline / no data fallback
      this.rankLines[0].setText('— ランキングを取得できませんでした —').setAlpha(1).setStyle({color:'#888',fontSize:'11px'});
      return;
    }

    const medals=['🥇','🥈','🥉','4','5'];
    const colors=['#FFD700','#C0C0C0','#CD7F32','#aaa','#aaa'];
    this.tweens.add({targets:this.rankTitle,alpha:1,duration:400});
    data.slice(0,5).forEach((row,i)=>{
      const name=(row.player_name||'???').padEnd(8,' ');
      const coins=row.coins||0;
      const isMine=myName&&row.player_name===myName;
      const t=this.rankLines[i];
      t.setText(`${medals[i]}  ${name}  🪙${coins}`);
      t.setStyle({color:isMine?'#FF00FF':colors[i],fontSize:'13px',fontFamily:'Arial Black'});
      if(isMine)t.setStyle({stroke:'#FFD700',strokeThickness:2});
      this.tweens.add({targets:t,alpha:1,duration:300,delay:i*100});
    });
  }
}

const config={
  type:Phaser.AUTO,
  width:W,height:H,
  parent:'phaser-game',
  backgroundColor:'#0a0a1a',
  pixelArt:false,
  antialias:true,
  antialiasGL:true,
  roundPixels:false,
  resolution:window.devicePixelRatio||1,
  render:{
    antialias:true,
    antialiasGL:true,
    pixelArt:false,
    roundPixels:false,
    powerPreference:'high-performance'
  },
  scale:{
    mode:Phaser.Scale.FIT,
    autoCenter:Phaser.Scale.CENTER_BOTH,
    width:W,height:H
  },
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:[BootScene,TitleScene,GameScene,GameOverScene]
};
new Phaser.Game(config);
</script>
</body>
</html>
