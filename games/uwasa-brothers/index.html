  spawnObstacle(){
    if(this.gameOver)return;
    // ★バグ修正: 針と敵が重なって避けられなくなるのを防止
    // lastSpawn を追跡して、直前が針なら次は飛行敵だけ or スキップ
    let firstWasSpike=false;
    if(Math.random()<.5){this.spawnSpike();firstWasSpike=true;}else{this.spawnEnemy();}

    if(this.stageIdx>=3&&Math.random()<.35){
      this.time.delayedCall(700,()=>{ // 400→700msで着地猶予
        if(this.gameOver)return;
        // 直前が針だった場合は飛行敵のみ許可（地面敵は着地ポイントが被って詰む）
        if(firstWasSpike){this.spawnEnemy(true);}
        else{Math.random()<.5?this.spawnSpike():this.spawnEnemy();}
      });
    }
    if(this.stageIdx>=6&&Math.random()<.3){this.time.delayedCall(900,()=>{if(!this.gameOver)this.spawnEnemy(true);});}
    if(this.stageIdx>=10&&Math.random()<.35){
      this.time.delayedCall(700,()=>{if(!this.gameOver)this.spawnSpike();});
      this.time.delayedCall(1200,()=>{if(!this.gameOver)this.spawnEnemy(true);}); // 地面敵→飛行敵に
    }
    if(this.stageIdx>=15&&Math.random()<.4){this.time.delayedCall(350,()=>{if(!this.gameOver)this.spawnEnemy(true);});}
    if(this.stageIdx>=20&&Math.random()<.5){
      const bursts=Phaser.Math.Between(2,3);
      let lastWasSpike=false;
      for(let i=0;i<bursts;i++){
        this.time.delayedCall(400+i*300,()=>{
          if(this.gameOver)return;
          // 連続で針を置かない + 針の直後は飛行敵のみ
          if(lastWasSpike){this.spawnEnemy(true);lastWasSpike=false;}
          else if(Math.random()<.5){this.spawnSpike();lastWasSpike=true;}
          else{this.spawnEnemy(Math.random()<.5);lastWasSpike=false;}
        });
      }
    }
    if(this.stageIdx>=25&&Math.random()<.55){
      this.time.delayedCall(300,()=>{if(!this.gameOver)this.spawnSpike();});
      this.time.delayedCall(700,()=>{if(!this.gameOver)this.spawnEnemy(true);});
      this.time.delayedCall(1100,()=>{if(!this.gameOver)this.spawnSpike();}); // 500,800→700,1100
    }
  }

  // Get effective scroll speed (accounts for super invincible 2x boost)
  getEffScrollSpeed(){return this.scrollSpeed*(this.superInvincible?2:1);}

  spawnSpike(){
    if(this.gameOver)return;
    const o=this.obstacles.create(W+40,GROUND_Y-13,'obs_spike_wall');
    o.setScale(1.2);
    o.body.setAllowGravity(false);
    o.body.setVelocityX(-this.getEffScrollSpeed());
    o.body.setSize(70,24);
    o.setDepth(50);
    o.isSpike=true;
  }

  spawnEnemy(forceFlying=false){
    if(this.gameOver)return;
    const types=[
      {key:'enemy_spiked',y:GROUND_Y-22,scale:1.2,hitW:32,hitH:32,flying:false,hp:1,speedMul:1,rolling:true},
      {key:'enemy_coal',y:GROUND_Y-20,scale:1.2,hitW:28,hitH:30,flying:false,hp:2,speedMul:.9,walking:true},
      {key:'enemy_ghost',y:GROUND_Y-100,scale:1.2,hitW:34,hitH:30,flying:true,hp:1,speedMul:.8,floating:true},
      {key:'obs_bat',y:GROUND_Y-130,scale:1.4,hitW:40,hitH:20,flying:true,hp:1,speedMul:1.1,bobbing:true},
    ];
    let pool=types.filter(t=>forceFlying?t.flying:true);
    if(this.stageIdx<2)pool=pool.filter(t=>!t.flying);
    const t=pool[Phaser.Math.Between(0,pool.length-1)];
    const e=this.enemies.create(W+40,t.y,t.key);
    e.setScale(t.scale);
    e.body.setAllowGravity(false);
    e.body.setVelocityX(-this.getEffScrollSpeed()*t.speedMul);
    e.body.setSize(t.hitW,t.hitH);
    e.setDepth(50);
    e.hp=t.hp;
    e.enemyType=t.key;
    if(t.rolling){this.tweens.add({targets:e,angle:360,duration:500,repeat:-1});}
    if(t.floating){this.tweens.add({targets:e,y:e.y-20,duration:800,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});}
    if(t.bobbing){const range=this.stageIdx>=15?50:30;this.tweens.add({targets:e,y:e.y+range,duration:this.stageIdx>=20?500:800,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});}
    if(t.walking){this.tweens.add({targets:e,y:e.y-4,duration:250,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});}
  }

  spawnCoin(){
    if(this.gameOver)return;
    const c=Phaser.Math.Between(2,4);
    for(let i=0;i<c;i++){
      const y=GROUND_Y-90-Phaser.Math.Between(0,80);
      const co=this.coins.create(W+20+i*30,y,'coin');
      co.body.setAllowGravity(false);co.body.setVelocityX(-this.getEffScrollSpeed());
      co.setDepth(45);
      this.tweens.add({targets:co,y:y-6,duration:400,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
      this.tweens.add({targets:co,angle:360,duration:800,repeat:-1});
    }
  }

  scheduleStagePowerup(idx){
    if(this.powerupSpawnScheduled[idx]||this.powerupSpawned[idx])return;
    this.powerupSpawnScheduled[idx]=true;
    const d=Phaser.Math.Between(4000,9000);
    this.time.delayedCall(d,()=>{
      if(this.gameOver||this.stageIdx!==idx||this.powerupSpawned[idx])return;
      this.spawnPowerup(idx);
    });
  }

  spawnPowerup(idx){
    if(this.powerupSpawned[idx])return;
    this.powerupSpawned[idx]=true;
    const s=STAGES[idx],k=s.powerupKey,pu=POWERUPS[k];
    const y=GROUND_Y-140;
    const it=this.powerups.create(W+30,y,'power_'+k);
    it.setScale(1.6);it.body.setAllowGravity(false);
    it.body.setVelocityX(-this.getEffScrollSpeed());
    it.body.setSize(32,32);it.powerKey=k;it.setDepth(55);
    const au=this.add.circle(it.x,it.y,32,pu.color,.35).setDepth(54);
    it.aura=au;
    this.tweens.add({targets:it,y:y-15,duration:500,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.tweens.add({targets:it,angle:360,duration:3000,repeat:-1});
    this.tweens.add({targets:au,scale:1.6,alpha:.18,duration:700,yoyo:true,repeat:-1});
    const n=this.add.text(W/2,100,'✨ RARE ITEM APPEARED! ✨',{fontSize:'26px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:5}).setOrigin(.5).setDepth(200).setAlpha(0);
    this.tweens.add({targets:n,alpha:1,y:105,duration:400,onComplete:()=>{this.tweens.add({targets:n,alpha:0,delay:1500,duration:500,onComplete:()=>n.destroy()});}});
    Audio.SFX.stageUp();
  }

  collectPowerup(pl,it){
    const k=it.powerKey;
    if(it.aura)it.aura.destroy();
    it.destroy();
    Audio.SFX.powerup();
    this.cameras.main.flash(400,255,215,0);
    this.currentForm=k;this.powerTimeRemaining=this.getPowerDuration();this.powerDuration=this.powerTimeRemaining;
    if(!gameState.powersCollected.includes(k))gameState.powersCollected.push(k);
    const pu=POWERUPS[k];
    showPowerBadge(k);
    this.powerText.setText(`${pu.emoji} ${pu.name} ${pu.emoji}`);
    this.powerText.setAlpha(0).setScale(.3);
    this.tweens.add({targets:this.powerText,alpha:1,scale:1,duration:500,ease:'Back.easeOut',onComplete:()=>{this.tweens.add({targets:this.powerText,alpha:0,delay:1500,duration:500});}});
    for(let i=0;i<24;i++){const p=this.add.circle(this.player.x,this.player.y,Phaser.Math.Between(4,12),pu.color,1).setDepth(110);const a=(i/24)*Math.PI*2;this.tweens.add({targets:p,x:this.player.x+Math.cos(a)*150,y:this.player.y+Math.sin(a)*150,alpha:0,scale:.2,duration:900,onComplete:()=>p.destroy()});}
  }

  projectileHitObstacle(proj,obs){
    if(obs.isSpike){if(proj.active)proj.destroy();return;}
    const x=obs.x,y=obs.y;obs.destroy();
    if(!['laser','angel','cosmic'].includes(this.currentForm)){if(proj.active)proj.destroy();}
    const pu=POWERUPS[this.currentForm]||{color:0xFFD700};
    for(let i=0;i<14;i++){const p=this.add.circle(x,y,Phaser.Math.Between(3,8),pu.color,.9).setDepth(95);const a=Math.random()*Math.PI*2,sp=Phaser.Math.Between(40,150);this.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scale:.2,duration:500,onComplete:()=>p.destroy()});}
    gameState.score+=25;
    const t=this.add.text(x,y,'+25',{fontSize:'18px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(120);
    this.tweens.add({targets:t,y:y-30,alpha:0,duration:500,onComplete:()=>t.destroy()});
    Audio.SFX.coin();
  }

  hitObstacle(pl,obs){
    if(this.invincible||this.gameOver)return;
    // Super invincible mode: destroy obstacles on contact
    if(this.superInvincible){
      const x=obs.x,y=obs.y;
      obs.destroy();
      gameState.score+=50;
      for(let i=0;i<14;i++){const p=this.add.circle(x,y,Phaser.Math.Between(3,8),0xFFD700,.9).setDepth(95);const a=Math.random()*Math.PI*2,sp=Phaser.Math.Between(40,150);this.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scale:.2,duration:500,onComplete:()=>p.destroy()});}
      const t=this.add.text(x,y,'+50',{fontSize:'18px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(120);
      this.tweens.add({targets:t,y:y-30,alpha:0,duration:500,onComplete:()=>t.destroy()});
      Audio.SFX.coin();
      return;
    }
    this.lives--;gameState.lives=this.lives;
    Audio.SFX.hit();
    this.cameras.main.shake(280,.015);
    this.cameras.main.flash(150,255,50,50);
    if(this.lives<=0){this.endGame();return;}
    this.invincible=true;
    this.tweens.add({targets:pl,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{pl.setAlpha(1);this.invincible=false;}});
    updateUI();
  }

  touchEnemy(player,enemy){
    if(this.invincible||this.gameOver||!enemy.active)return;
    // Super invincible: kill enemies on touch
    if(this.superInvincible){
      this.killEnemy(enemy,false);
      gameState.score+=50;
      return;
    }
    if(player.body.velocity.y>100&&player.y<enemy.y-10){
      enemy.hp--;
      Audio.SFX.stomp();
      player.setVelocityY(-580);
      gameState.score+=30;
      this.tweens.add({targets:enemy,scaleY:.3,duration:80,yoyo:true});
      if(enemy.hp<=0){this.killEnemy(enemy,true);}
      else{enemy.setTint(0xFF6666);this.time.delayedCall(120,()=>{if(enemy.active)enemy.clearTint();});}
    }else{
      this.lives--;gameState.lives=this.lives;
      Audio.SFX.hit();
      this.cameras.main.shake(280,.015);
      this.cameras.main.flash(150,255,50,50);
      if(this.lives<=0){this.endGame();return;}
      this.invincible=true;
      this.tweens.add({targets:player,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{player.setAlpha(1);this.invincible=false;}});
      updateUI();
    }
  }

  projectileHitEnemy(proj,enemy){
    if(!enemy.active)return;
    const dmg=proj.damage||1;
    enemy.hp-=dmg;
    if(!['laser','angel','cosmic'].includes(this.currentForm)){if(proj.active)proj.destroy();}
    if(enemy.hp<=0){this.killEnemy(enemy,false);gameState.score+=50;}
    else{
      enemy.setTint(0xFF6666);
      this.time.delayedCall(120,()=>{if(enemy.active)enemy.clearTint();});
      const txt=this.add.text(enemy.x,enemy.y-30,`-${dmg}`,{fontSize:'14px',fontFamily:'Arial Black',color:'#FFFFFF',stroke:'#000',strokeThickness:2}).setOrigin(.5).setDepth(120);
      this.tweens.add({targets:txt,y:enemy.y-50,alpha:0,duration:400,onComplete:()=>txt.destroy()});
    }
  }

  killEnemy(enemy,wasStomped){
    const x=enemy.x,y=enemy.y;
    for(let i=0;i<12;i++){
      const p=this.add.circle(x,y,Phaser.Math.Between(3,7),0xFFD700,.9).setDepth(95);
      const a=Math.random()*Math.PI*2,sp=Phaser.Math.Between(40,140);
      this.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scale:.2,duration:500,onComplete:()=>p.destroy()});
    }
    const t=this.add.text(x,y,wasStomped?'+30 STOMP!':'+50 KILL!',{fontSize:'16px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(120);
    this.tweens.add({targets:t,y:y-40,alpha:0,duration:700,onComplete:()=>t.destroy()});
    enemy.destroy();
    Audio.SFX.coin();
  }

  collectCoin(pl,co){
    co.destroy();
    this.coinsCollected+=10;gameState.coins=this.coinsCollected;gameState.score+=10;
    Audio.SFX.coin();
    const s=this.add.text(co.x,co.y,'+10',{fontSize:'20px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(120);
    this.tweens.add({targets:s,y:s.y-40,alpha:0,scale:1.5,duration:700,onComplete:()=>s.destroy()});
  }

  spawnBoss(stageIdx){
    if(this.bossActive||this.gameOver)return;
    const bossKey=STAGES[stageIdx].boss;
    const bossData=BOSSES[bossKey];
    if(!bossData)return;
    this.bossActive=true;
    this.bossStageIdx=stageIdx;
    this.bossKey=bossKey;
    this.bossData=bossData;
    this.obstTimer.paused=true;
    this.obstacles.getChildren().forEach(o=>{this.tweens.add({targets:o,alpha:0,duration:300,onComplete:()=>o.destroy()});});
    this.enemies.getChildren().forEach(e=>{this.tweens.add({targets:e,alpha:0,duration:300,onComplete:()=>e.destroy()});});
    Audio.SFX.bossAppear();
    this.cameras.main.shake(600,.015);
    Audio.stopBGM();
    this.time.delayedCall(800,()=>{if(this.bossActive)Audio.startBossBGM();});
    const banner=this.add.text(W/2,H/2-70,bossData.title,{fontSize:'32px',fontFamily:'Arial Black',color:'#FF0033',stroke:'#FFD700',strokeThickness:5}).setOrigin(.5).setDepth(250).setAlpha(0);
    const nameBanner=this.add.text(W/2,H/2+10,bossData.name,{fontSize:'58px',fontFamily:'Arial Black',color:bossData.nameColor,stroke:bossData.nameStroke,strokeThickness:7,letterSpacing:6}).setOrigin(.5).setDepth(250).setAlpha(0);
    this.tweens.add({targets:banner,alpha:1,scale:{from:2,to:1},duration:600,ease:'Back.easeOut'});
    this.tweens.add({targets:nameBanner,alpha:1,scale:{from:2,to:1},duration:600,delay:200,ease:'Back.easeOut',onComplete:()=>{
      this.tweens.add({targets:[banner,nameBanner],alpha:0,delay:1500,duration:500,onComplete:()=>{banner.destroy();nameBanner.destroy();}});
    }});
    this.boss=this.add.image(W+80,GROUND_Y-50,`boss_${bossKey}_idle`);
    this.boss.setOrigin(.5,.5);
    this.boss.setDepth(80);
    this.boss.setScale(1.15);
    this.boss.hp=bossData.hp;
    this.boss.maxHp=bossData.hp;
    this.boss.frameIdx=0;
    this.boss.active=true;
    this.bossAnchorX=W-260;
    this.bossAnchorY=GROUND_Y-50;
    this.bossLocked=false;
    this.tweens.add({targets:this.boss,x:this.bossAnchorX,duration:1800,ease:'Cubic.easeOut',onComplete:()=>{
      if(!this.bossActive)return;
      this.bossLocked=true;
      this.startBossAttacks();
    }});
    this.bossIdleTween=this.tweens.add({targets:this.boss,y:GROUND_Y-52,duration:900,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.bossHpBar=this.add.graphics().setDepth(210);
    this.bossNameText=this.add.text(W/2,28,`⚔ ${bossData.name} ⚔`,{fontSize:'18px',fontFamily:'Arial Black',color:bossData.nameColor,stroke:bossData.nameStroke,strokeThickness:4,letterSpacing:3}).setOrigin(.5).setDepth(211);
  }

  drawBossHpBar(){
    if(!this.bossHpBar||!this.boss)return;
    const g=this.bossHpBar;g.clear();
    const pct=Math.max(0,this.boss.hp/this.boss.maxHp);
    const bw=300,bh=12;
    const x=W/2-bw/2,y=42;
    g.fillStyle(0,.7);g.fillRoundedRect(x-3,y-3,bw+6,bh+6,4);
    let col=0x00FF44;
    if(pct<.33)col=0xFF0033;
    else if(pct<.66)col=0xFFAA00;
    g.fillStyle(col,1);g.fillRoundedRect(x,y,bw*pct,bh,3);
    g.lineStyle(2,0xFFD700);g.strokeRoundedRect(x-3,y-3,bw+6,bh+6,4);
  }

  startBossAttacks(){
    if(!this.bossActive||this.gameOver||!this.boss)return;
    const delay=this.bossData?this.bossData.attackDelay:1500;
    this.bossAttackTimer=this.time.addEvent({delay:delay,callback:()=>this.bossDoAttack(),callbackScope:this,loop:true});
    this.bossMoveTween=this.tweens.add({targets:this.boss,y:{from:GROUND_Y-140,to:GROUND_Y-50},duration:2500,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    if(this.bossIdleTween){this.bossIdleTween.stop();}

    // ═══ SPECIAL ATTACK TIMER ═══
    if(this.bossData&&this.bossData.specialInterval>0){
      this.bossSpecialTimer=this.time.addEvent({
        delay:this.bossData.specialInterval,
        callback:()=>this.bossDoSpecialAttack(),
        callbackScope:this,
        loop:true,
        startAt:this.bossData.specialInterval*.5 // 先取り実行でテンポ良く
      });
    }
  }

  bossDoSpecialAttack(){
    if(!this.bossActive||this.gameOver||!this.boss||!this.boss.active)return;
    const st=this.bossData.specialType;
    if(st==='teleport')this.bossSpecialTeleport();
    else if(st==='flame_beam')this.bossSpecialFlameBeam();
    else if(st==='ice_rain')this.bossSpecialIceRain();
    else if(st==='glitch_storm')this.bossSpecialGlitchStorm();
    else if(st==='blackhole')this.bossSpecialBlackhole();
  }

  // ═══ SHADOW KING: テレポート → 画面上部から急降下弾 ═══
  bossSpecialTeleport(){
    if(!this.boss||!this.boss.active)return;
    const boss=this.boss;
    Audio.SFX.shadow&&Audio.SFX.shadow();
    // Fade out with dark ring
    const ring=this.add.circle(boss.x,boss.y,10,0xAA00FF,.7).setDepth(78);
    this.tweens.add({targets:ring,scale:15,alpha:0,duration:400,onComplete:()=>ring.destroy()});
    this.tweens.add({targets:boss,alpha:0,duration:350,onComplete:()=>{
      if(!boss.active)return;
      // Teleport to a random upper position
      const targets=[
        {x:W-120,y:GROUND_Y-200},
        {x:W-200,y:GROUND_Y-280},
        {x:W-300,y:GROUND_Y-180},
        {x:this.bossAnchorX,y:GROUND_Y-250},
      ];
      const t=targets[Phaser.Math.Between(0,targets.length-1)];
      boss.x=t.x; boss.y=t.y;
      // Appearing effect
      const ring2=this.add.circle(boss.x,boss.y,10,0xAA00FF,.9).setDepth(78);
      this.tweens.add({targets:ring2,scale:15,alpha:0,duration:400,onComplete:()=>ring2.destroy()});
      this.tweens.add({targets:boss,alpha:1,duration:350,onComplete:()=>{
        if(!boss.active)return;
        // Dive bombing shots - 3 quick shots directed down at player
        for(let i=0;i<3;i++){
          this.time.delayedCall(i*150,()=>{
            if(!boss.active)return;
            const proj=this.bossProjectiles.create(boss.x,boss.y+20,'proj_shadow');
            proj.setDepth(85);
            proj.body.setAllowGravity(false);
            proj.setScale(1.6);
            proj.setTint(0xAA00FF);
            const dx=(PLAYER_X+Phaser.Math.Between(-40,40))-boss.x;
            const dy=(GROUND_Y-40)-boss.y;
            const dist=Math.hypot(dx,dy);
            proj.body.setVelocityX(dx/dist*650);
            proj.body.setVelocityY(dy/dist*650);
            proj.body.setSize(22,22);
            this.tweens.add({targets:proj,angle:720,duration:800,repeat:-1});
            proj.hasHit=false;
            this.time.delayedCall(2500,()=>{if(proj.active)proj.destroy();});
          });
        }
        // Then return to anchor
        this.time.delayedCall(900,()=>{
          if(!boss.active)return;
          this.tweens.add({targets:boss,x:this.bossAnchorX,y:this.bossAnchorY,duration:600,ease:'Cubic.easeInOut'});
        });
      }});
    }});
  }

  // ═══ FIRE GOD: 横一文字ファイアブレス ═══
  bossSpecialFlameBeam(){
    if(!this.boss||!this.boss.active)return;
    const boss=this.boss;
    const beamY=Phaser.Math.Between(0,1)? GROUND_Y-80 : GROUND_Y-180; // 低or高
    // Warning line - 1.2 秒
    const warn=this.add.rectangle(W/2,beamY,W,6,0xFF3300,.4).setDepth(82);
    warn.setStrokeStyle(1,0xFFFF00,.8);
    this.tweens.add({targets:warn,alpha:{from:.4,to:.9},duration:120,yoyo:true,repeat:4});
    const warnTxt=this.add.text(boss.x-40,beamY-26,'⚠ FIRE!',{fontSize:'18px',fontFamily:'Arial Black',color:'#FFFF00',stroke:'#FF0000',strokeThickness:3}).setOrigin(1,.5).setDepth(220);
    this.time.delayedCall(1200,()=>{
      warn.destroy(); warnTxt.destroy();
      if(!boss.active)return;
      Audio.SFX.fire&&Audio.SFX.fire();
      this.cameras.main.shake(400,.012);
      // The beam itself - a rectangle that exists for 500ms
      const beam=this.add.rectangle(W/2,beamY,W,36,0xFF5500,.85).setDepth(84);
      beam.setStrokeStyle(3,0xFFFF00,1);
      this.physics.add.existing(beam);
      beam.body.setAllowGravity(false);
      beam.body.setSize(W,36);
      beam.isFireBeam=true;
      this.bossProjectiles.add(beam);
      // Flicker
      this.tweens.add({targets:beam,alpha:{from:.7,to:1},duration:60,yoyo:true,repeat:7});
      // Particles along the beam
      for(let i=0;i<30;i++){
        const px=Phaser.Math.Between(0,W),py=beamY+Phaser.Math.Between(-18,18);
        const p=this.add.circle(px,py,Phaser.Math.Between(4,10),0xFFAA00,.9).setDepth(85);
        this.tweens.add({targets:p,scale:.1,alpha:0,y:py-30,duration:500,onComplete:()=>p.destroy()});
      }
      this.time.delayedCall(500,()=>{if(beam.active)beam.destroy();});
    });
  }

  // ═══ ICE QUEEN: 空から氷柱弾幕 ═══
  bossSpecialIceRain(){
    if(!this.boss||!this.boss.active)return;
    // 6本の氷柱が頭上から降ってくる。予告マークあり。
    const cols=6;
    for(let i=0;i<cols;i++){
      this.time.delayedCall(i*180,()=>{
        if(!this.bossActive)return;
        const x=Phaser.Math.Between(50,W-250);
        // Warning marker on ground
        const marker=this.add.circle(x,GROUND_Y-8,20,0xAAEEFF,.4).setDepth(80);
        marker.setStrokeStyle(2,0x00FFFF,.9);
        this.tweens.add({targets:marker,scale:{from:.5,to:1.3},alpha:{from:.4,to:.9},duration:200,yoyo:true,repeat:2});
        this.time.delayedCall(700,()=>{
          marker.destroy();
          if(!this.bossActive)return;
          // Ice spike falls from the sky
          Audio.SFX.ice&&Audio.SFX.ice();
          const proj=this.bossProjectiles.create(x,-30,'proj_ice');
          proj.setDepth(85);
          proj.setScale(2);
          proj.setTint(0x88DDFF);
          proj.body.setAllowGravity(false);
          proj.body.setVelocityY(700);
          proj.body.setVelocityX(0);
          proj.body.setSize(22,28);
          proj.angle=90;
          proj.hasHit=false;
          // Shatter when hits ground
          proj.groundCheckTimer=this.time.addEvent({
            delay:20,repeat:-1,
            callback:()=>{
              if(!proj.active)return;
              if(proj.y>=GROUND_Y-14){
                this.shatterBossObject({x:proj.x,y:proj.y,throwType:'ice_spike',active:true,destroy:()=>proj.destroy(),groundCheckTimer:proj.groundCheckTimer});
              }
            }
          });
          this.time.delayedCall(3000,()=>{if(proj.active)proj.destroy();});
        });
      });
    }
  }

  // ═══ CYBER LORD: 予告線付きグリッチ弾幕 ═══
  bossSpecialGlitchStorm(){
    if(!this.boss||!this.boss.active)return;
    const boss=this.boss;
    const numLines=5;
    for(let i=0;i<numLines;i++){
      this.time.delayedCall(i*120,()=>{
        if(!this.bossActive)return;
        // Random angle toward left half
        const angle=Phaser.Math.FloatBetween(Math.PI*.85,Math.PI*1.15);
        const len=700;
        const ex=boss.x+Math.cos(angle)*len;
        const ey=boss.y+Math.sin(angle)*len;
        // Warning line
        const line=this.add.line(0,0,boss.x,boss.y,ex,ey,0x00FFFF,.7).setOrigin(0,0).setDepth(82);
        line.setLineWidth(3);
        this.tweens.add({targets:line,alpha:{from:.3,to:.9},duration:100,yoyo:true,repeat:3});
        this.time.delayedCall(800,()=>{
          line.destroy();
          if(!boss.active)return;
          // Fire laser orb along the line
          Audio.SFX.laser&&Audio.SFX.laser();
          const proj=this.bossProjectiles.create(boss.x,boss.y,'power_laser');
          proj.setDepth(85);
          proj.setScale(1.3);
          proj.setTint(0x00FFFF);
          proj.body.setAllowGravity(false);
          const vx=Math.cos(angle)*600;
          const vy=Math.sin(angle)*600;
          proj.body.setVelocityX(vx);
          proj.body.setVelocityY(vy);
          proj.body.setSize(22,22);
          proj.hasHit=false;
          // Glitch particle trail
          proj.trailTimer=this.time.addEvent({
            delay:40,repeat:30,
            callback:()=>{
              if(!proj.active)return;
              const cs=[0x00FFFF,0xFF00FF,0xFFFF00,0xFFFFFF];
              const t=this.add.rectangle(proj.x+Phaser.Math.Between(-8,8),proj.y+Phaser.Math.Between(-8,8),
                Phaser.Math.Between(4,10),Phaser.Math.Between(2,6),cs[Phaser.Math.Between(0,3)],.7).setDepth(83);
              this.tweens.add({targets:t,alpha:0,duration:200,onComplete:()=>t.destroy()});
            }
          });
          this.time.delayedCall(2500,()=>{
            if(proj.trailTimer)proj.trailTimer.remove();
            if(proj.active)proj.destroy();
          });
        });
      });
    }
    this.cameras.main.flash(80,0,255,255);
  }

  // ═══ COSMIC GOD: ブラックホール吸引＋放射弾 ═══
  bossSpecialBlackhole(){
    if(!this.boss||!this.boss.active)return;
    // Summon blackhole in the middle-left area
    const bhx=W/2-30, bhy=GROUND_Y-150;
    const bh=this.add.image(bhx,bhy,'power_cosmic').setDepth(82).setScale(0).setAlpha(.9);
    bh.setTint(0xFF00FF);
    // Swirl rotation
    this.tweens.add({targets:bh,angle:720,duration:1600,repeat:-1});
    this.tweens.add({targets:bh,scale:3.5,duration:500,ease:'Back.easeOut'});
    // Suction effect on player
    this.blackholeActive=true;
    this.blackholePos={x:bhx,y:bhy};
    const suctionTimer=this.time.addEvent({
      delay:30,repeat:80,
      callback:()=>{
        if(!this.player||!this.player.active||this.gameOver||!this.blackholeActive){return;}
        const dx=bhx-this.player.x, dy=bhy-this.player.y;
        const dist=Math.max(30,Math.hypot(dx,dy));
        if(dist<280){
          const force=(280-dist)*8;
          this.player.body.velocity.x+=(dx/dist)*force*.03;
          this.player.body.velocity.y+=(dy/dist)*force*.03;
        }
        // Accretion disk particles
        if(Math.random()<.6){
          const a=Math.random()*Math.PI*2;
          const r=Phaser.Math.Between(60,120);
          const cs=[0xFF00FF,0x8A2BE2,0x00FFFF,0xFFFFFF];
          const p=this.add.circle(bhx+Math.cos(a)*r,bhy+Math.sin(a)*r,
            Phaser.Math.Between(2,5),cs[Phaser.Math.Between(0,3)],.9).setDepth(81);
          this.tweens.add({targets:p,x:bhx,y:bhy,alpha:0,scale:.1,duration:600,onComplete:()=>p.destroy()});
        }
      }
    });
    // After 1 second, release radial burst
    this.time.delayedCall(1200,()=>{
      if(!this.bossActive)return;
      Audio.SFX.cosmic&&Audio.SFX.cosmic();
      this.cameras.main.shake(400,.015);
      this.cameras.main.flash(300,255,0,255);
      // 8-way radial projectiles
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2;
        const proj=this.bossProjectiles.create(bhx,bhy,'proj_cosmic');
        proj.setDepth(85);
        proj.setScale(1.5);
        proj.setTint(0xFF00FF);
        proj.body.setAllowGravity(false);
        proj.body.setVelocityX(Math.cos(a)*450);
        proj.body.setVelocityY(Math.sin(a)*450);
        proj.body.setSize(24,24);
        proj.hasHit=false;
        this.tweens.add({targets:proj,angle:1080,duration:2500,repeat:-1});
        this.time.delayedCall(3000,()=>{if(proj.active)proj.destroy();});
      }
      // Collapse blackhole
      this.tweens.add({targets:bh,scale:0,alpha:0,duration:400,onComplete:()=>bh.destroy()});
      this.time.delayedCall(100,()=>{this.blackholeActive=false;suctionTimer.remove();});
    });
  }

  bossDoAttack(){
    if(!this.bossActive||this.gameOver||!this.boss||!this.boss.active)return;
    const key=this.bossKey;
    this.boss.setTexture(`boss_${key}_throw1`);
    this.time.delayedCall(180,()=>{
      if(!this.boss||!this.boss.active)return;
      this.boss.setTexture(`boss_${key}_throw2`);
      Audio.SFX.bossThrow();
      const types=this.bossData.throwTypes;
      const count=this.bossData.projectileCount||1;
      for(let i=0;i<count;i++){
        this.time.delayedCall(i*120,()=>{
          if(!this.boss||!this.boss.active)return;
          const type=types[Phaser.Math.Between(0,types.length-1)];
          this.bossThrowObject(type,i);
        });
      }
      this.time.delayedCall(250+count*120,()=>{
        if(this.boss&&this.boss.active)this.boss.setTexture(`boss_${key}_idle`);
      });
    });
  }

  bossThrowObject(type,idx=0){
    if(!this.boss||!this.boss.active)return;
    const texMap={
      plate:'throw_plate', bowl:'throw_bowl', hookah:'throw_hookah',
      skull:'power_devil', dagger:'proj_shadow', bomb:'power_shadow',
      fireball:'proj_fire', lava:'power_fire', meteor:'obs_hookah',
      ice_spike:'proj_ice', snowball:'coin', icicle:'power_ice',
      laser_orb:'power_laser', glitch:'proj_laser', data_shard:'proj_thunder',
      blackhole:'power_cosmic', star:'coin', nebula:'proj_cosmic',
    };
    const tex=texMap[type]||'throw_plate';
    const startX=this.boss.x-60;
    const startY=this.boss.y-20+idx*10;
    const proj=this.bossProjectiles.create(startX,startY,tex);
    proj.setDepth(85);
    proj.body.setAllowGravity(true);
    proj.body.setGravityY(900);
    proj.throwType=type;
    proj.setScale(1.2);
    proj.hasHit=false;
    proj.spawnTime=this.time.now;
    const targetX=PLAYER_X+Phaser.Math.Between(-60,60);
    const dx=targetX-startX;
    const flightTime=Math.max(.5,.85-this.stageIdx*.01);
    const vx=dx/flightTime;
    const vy=-400-Phaser.Math.Between(0,200);
    proj.body.setVelocityX(vx);
    proj.body.setVelocityY(vy);
    this.tweens.add({targets:proj,angle:720,duration:1200,repeat:-1});
    const sz=type==='plate'?{w:28,h:28}:type==='bowl'?{w:30,h:26}:{w:26,h:26};
    proj.body.setSize(sz.w,sz.h);
    proj.groundCheckTimer=this.time.addEvent({
      delay:20,repeat:-1,
      callback:()=>{if(!proj.active)return;if(proj.y>=GROUND_Y-14)this.shatterBossObject(proj);}
    });
  }

  shatterBossObject(proj){
    if(!proj.active)return;
    const x=proj.x,y=Math.min(proj.y,GROUND_Y-14),type=proj.throwType;
    if(proj.groundCheckTimer)proj.groundCheckTimer.remove();
    proj.destroy();
    Audio.SFX.shatter();
    this.cameras.main.shake(100,.004);
    const flash=this.add.circle(x,y,20,0xFFFFFF,.8).setDepth(88);
    this.tweens.add({targets:flash,scale:2,alpha:0,duration:200,onComplete:()=>flash.destroy()});
    const shardCount=type==='plate'?7:type==='bowl'?6:5;
    for(let i=0;i<shardCount;i++){
      const sh=this.bossShards.create(x,y,'shard_'+((i%4)+1));
      sh.setDepth(75);
      sh.body.setAllowGravity(true);
      sh.body.setGravityY(1100);
      sh.setScale(1.2);
      const angle=Phaser.Math.Between(-180,-20)*Math.PI/180;
      const speed=Phaser.Math.Between(200,420);
      sh.body.setVelocityX(Math.cos(angle)*speed);
      sh.body.setVelocityY(Math.sin(angle)*speed);
      sh.body.setSize(8,8);
      sh.tint=type==='bowl'?0x8B4513:type==='plate'?0xFFFFFF:0xFFD700;
      sh.setTint(sh.tint);
      this.tweens.add({targets:sh,angle:Phaser.Math.Between(-720,720),duration:1500});
      this.time.delayedCall(2500,()=>{if(sh.active)sh.destroy();});
    }
    if(type==='hookah'){
      for(let i=0;i<6;i++){
        const e=this.add.circle(x,y,Phaser.Math.Between(3,8),0xFF6600,.9).setDepth(78);
        const ang=Math.random()*Math.PI*2;
        this.tweens.add({targets:e,x:x+Math.cos(ang)*Phaser.Math.Between(30,80),y:y+Math.sin(ang)*Phaser.Math.Between(30,80),alpha:0,scale:.2,duration:600,onComplete:()=>e.destroy()});
      }
    }
  }

  hitBossProjectile(player,proj){
    if(this.invincible||this.gameOver)return;
    if(proj.groundCheckTimer)proj.groundCheckTimer.remove();
    proj.destroy();
    if(this.superInvincible){
      Audio.SFX.coin();
      return;
    }
    this.lives--;gameState.lives=this.lives;
    Audio.SFX.hit();
    this.cameras.main.shake(300,.015);
    this.cameras.main.flash(150,255,50,50);
    if(this.lives<=0){this.endGame();return;}
    this.invincible=true;
    this.tweens.add({targets:player,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{player.setAlpha(1);this.invincible=false;}});
    updateUI();
  }

  cancelBossProjectile(playerProj,bossProj){
    if(!bossProj.active)return;
    if(bossProj.reflected)return;
    if(bossProj.groundCheckTimer)bossProj.groundCheckTimer.remove();
    bossProj.reflected=true;
    bossProj.body.setAllowGravity(false);
    let targetX=this.boss?this.boss.x:W-200;
    let targetY=this.boss?this.boss.y:H/2;
    const dx=targetX-bossProj.x;
    const dy=targetY-bossProj.y;
    const dist=Math.max(1,Math.hypot(dx,dy));
    const speed=1100;
    bossProj.body.setVelocityX((dx/dist)*speed);
    bossProj.body.setVelocityY((dy/dist)*speed);
    bossProj.setTint(0xFFD700);
    const flash=this.add.circle(bossProj.x,bossProj.y,20,0xFFFFFF,.9).setDepth(100);
    this.tweens.add({targets:flash,scale:3,alpha:0,duration:300,onComplete:()=>flash.destroy()});
    this.cameras.main.shake(80,.006);
    Audio.SFX.punch();
    bossProj.trailTimer=this.time.addEvent({
      delay:40,repeat:-1,
      callback:()=>{if(!bossProj.active)return;const t=this.add.circle(bossProj.x,bossProj.y,5,0xFFD700,.7).setDepth(83);this.tweens.add({targets:t,scale:.1,alpha:0,duration:300,onComplete:()=>t.destroy()});}
    });
    bossProj.reflectDamage=5;
    if(playerProj.active)playerProj.destroy();
    gameState.score+=20;
    const txt=this.add.text(bossProj.x,bossProj.y-20,'PARRY!',{fontSize:'20px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF00FF',strokeThickness:4}).setOrigin(.5).setDepth(220);
    this.tweens.add({targets:txt,y:bossProj.y-50,alpha:0,duration:600,onComplete:()=>txt.destroy()});
  }

  bossShout(intensity){
    if(!this.boss||!this.boss.active)return;
    if(this.bossLastShout&&Date.now()-this.bossLastShout<500)return;
    this.bossLastShout=Date.now();
    const data=this.bossData||BOSSES.ryosuke;
    let pool;
    if(intensity>=3)pool=data.shoutHeavy;
    else if(intensity>=2)pool=data.shoutMid;
    else pool=data.shoutLight;
    const line=pool[Phaser.Math.Between(0,pool.length-1)];
    const bubble=this.add.container(this.boss.x,this.boss.y-80).setDepth(230);
    const text=this.add.text(0,0,line,{fontSize:'18px',fontFamily:'Arial Black',color:'#000000',backgroundColor:'#FFFFFF',padding:{x:10,y:6}}).setOrigin(.5);
    const pointer=this.add.triangle(0,text.displayHeight/2+4,-6,0,6,0,0,8,0xFFFFFF).setOrigin(.5,0);
    bubble.add([text,pointer]);
    bubble.setScale(.3);
    this.tweens.add({targets:bubble,scale:1,duration:200,ease:'Back.easeOut',onComplete:()=>{
      this.tweens.add({targets:bubble,x:bubble.x+3,duration:40,yoyo:true,repeat:5});
      this.tweens.add({targets:bubble,alpha:0,y:bubble.y-20,delay:900,duration:400,onComplete:()=>bubble.destroy()});
    }});
  }

  hitBossManual(proj){
    if(!this.boss||!this.boss.active)return;
    const boss=this.boss;
    if(proj.lastBossHit&&this.time.now-proj.lastBossHit<300)return;
    proj.lastBossHit=this.time.now;
    const dmg=proj.damage||1;
    boss.hp-=dmg;
    Audio.SFX.bossHurt();
    boss.setTint(0xFF5555);
    this.time.delayedCall(100,()=>{if(boss.active)boss.clearTint();});
    const txt=this.add.text(boss.x,boss.y-60,`-${dmg}`,{fontSize:'20px',fontFamily:'Arial Black',color:'#FF3344',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(220);
    this.tweens.add({targets:txt,y:boss.y-100,alpha:0,duration:600,onComplete:()=>txt.destroy()});
    if(!['laser','angel','cosmic'].includes(this.currentForm)){if(proj.active)proj.destroy();}
    const intensity=dmg>=3?2:1;
    this.bossShout(intensity);
    if(boss.hp<=0)this.defeatBoss();
  }

  reflectedHitBossManual(proj){
    if(!this.boss||!this.boss.active||proj.hasHit)return;
    proj.hasHit=true;
    const boss=this.boss;
    const dmg=proj.reflectDamage||5;
    boss.hp-=dmg;
    Audio.SFX.bossHurt();
    if(proj.trailTimer)proj.trailTimer.remove();
    if(proj.groundCheckTimer)proj.groundCheckTimer.remove();
    const imp=this.add.circle(proj.x,proj.y,30,0xFFD700,1).setDepth(220);
    this.tweens.add({targets:imp,scale:4,alpha:0,duration:400,onComplete:()=>imp.destroy()});
    this.cameras.main.shake(300,.018);
    this.cameras.main.flash(200,255,215,0);
    boss.setTint(0xFF3333);
    this.time.delayedCall(180,()=>{if(boss.active)boss.clearTint();});
    this.tweens.add({targets:boss,alpha:.5,duration:80,yoyo:true});
    proj.destroy();
    const txt=this.add.text(boss.x,boss.y-60,`-${dmg} BOOMERANG!`,{fontSize:'22px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF00FF',strokeThickness:5}).setOrigin(.5).setDepth(221);
    this.tweens.add({targets:txt,y:boss.y-110,alpha:0,duration:900,onComplete:()=>txt.destroy()});
    gameState.score+=100;
    this.bossShout(3);
    if(boss.hp<=0)this.defeatBoss();
  }

  playerTouchBossManual(){
    if(!this.boss||!this.boss.active||this.invincible||this.gameOver)return;
    if(this.bossTouchCooldown&&this.time.now-this.bossTouchCooldown<500)return;
    this.bossTouchCooldown=this.time.now;
    const player=this.player,boss=this.boss;
    if(player.body.velocity.y>100&&player.y<boss.y-20){
      boss.hp-=3;
      Audio.SFX.bossHurt();
      player.setVelocityY(-600);
      boss.setTint(0xFF5555);
      this.time.delayedCall(100,()=>{if(boss.active)boss.clearTint();});
      const txt=this.add.text(boss.x,boss.y-60,'-3 STOMP!',{fontSize:'18px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(220);
      this.tweens.add({targets:txt,y:boss.y-100,alpha:0,duration:700,onComplete:()=>txt.destroy()});
      this.bossShout(2);
      if(boss.hp<=0)this.defeatBoss();
    }else{
      this.lives--;gameState.lives=this.lives;
      Audio.SFX.hit();
      this.cameras.main.shake(300,.015);
      this.cameras.main.flash(150,255,50,50);
      if(this.lives<=0){this.endGame();return;}
      this.invincible=true;
      player.setVelocityX(-200);
      player.setVelocityY(-350);
      this.tweens.add({targets:player,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{
        player.setAlpha(1);this.invincible=false;
        if(player.body)player.body.setVelocityX(0);
      }});
      updateUI();
    }
  }

  defeatBoss(){
    if(!this.bossActive||!this.boss)return;
    const boss=this.boss;
    this.bossActive=false;
    this.bossLocked=false;
    boss.active=false;
    this.bossDefeatedStages[this.bossStageIdx]=true;
    if(this.bossAttackTimer)this.bossAttackTimer.remove();
    if(this.bossSpecialTimer)this.bossSpecialTimer.remove();
    this.blackholeActive=false;
    if(this.bossMoveTween)this.bossMoveTween.stop();
    Audio.SFX.bossDefeat();
    const defeatLines=(this.bossData&&this.bossData.shoutDefeat)||['もう無理…','負けた…'];
    const line=defeatLines[Phaser.Math.Between(0,defeatLines.length-1)];
    const bubble=this.add.container(boss.x,boss.y-80).setDepth(230);
    const text=this.add.text(0,0,line,{fontSize:'20px',fontFamily:'Arial Black',color:'#000',backgroundColor:'#FFFFFF',padding:{x:10,y:6}}).setOrigin(.5);
    const pointer=this.add.triangle(0,text.displayHeight/2+4,-6,0,6,0,0,8,0xFFFFFF).setOrigin(.5,0);
    bubble.add([text,pointer]);
    bubble.setScale(.3);
    this.tweens.add({targets:bubble,scale:1,duration:300,ease:'Back.easeOut'});
    this.tweens.add({targets:bubble,alpha:0,delay:1500,duration:400,onComplete:()=>bubble.destroy()});
    this.bossProjectiles.getChildren().forEach(p=>{if(p.groundCheckTimer)p.groundCheckTimer.remove();p.destroy();});
    this.bossShards.getChildren().forEach(s=>s.destroy());
    this.tweens.add({targets:boss,y:boss.y+20,alpha:.5,angle:{from:0,to:180},duration:800,ease:'Cubic.easeIn'});
    for(let i=0;i<40;i++){
      const p=this.add.circle(boss.x,boss.y,Phaser.Math.Between(4,10),[0xFFD700,0xFF0033,0xFFFFFF,0xFF00FF][i%4],1).setDepth(200);
      const a=(i/40)*Math.PI*2;
      this.tweens.add({targets:p,x:boss.x+Math.cos(a)*Phaser.Math.Between(100,250),y:boss.y+Math.sin(a)*Phaser.Math.Between(100,250),alpha:0,scale:.1,duration:1200,onComplete:()=>p.destroy()});
    }
    this.cameras.main.shake(500,.02);
    this.cameras.main.flash(400,255,255,0);
    const bossName=(this.bossData&&this.bossData.name)||'BOSS';
    const win=this.add.text(W/2,H/2-40,`${bossName} DEFEATED!`,{fontSize:'42px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF0033',strokeThickness:6}).setOrigin(.5).setDepth(250).setAlpha(0);
    this.tweens.add({targets:win,alpha:1,scale:{from:.5,to:1.2},duration:500,ease:'Back.easeOut',onComplete:()=>{
      this.tweens.add({targets:win,alpha:0,scale:1.4,delay:1500,duration:500,onComplete:()=>win.destroy()});
    }});
    gameState.score+=1000;
    const sc=this.add.text(W/2,H/2+20,'+1000 BONUS!',{fontSize:'26px',fontFamily:'Arial Black',color:'#00FFAA',stroke:'#000',strokeThickness:4}).setOrigin(.5).setDepth(250).setAlpha(0);
    this.tweens.add({targets:sc,alpha:1,y:H/2+10,duration:600,delay:400,onComplete:()=>{
      this.tweens.add({targets:sc,alpha:0,delay:1500,duration:500,onComplete:()=>sc.destroy()});
    }});
    this.time.delayedCall(1200,()=>{
      if(boss)boss.destroy();
      if(this.bossHpBar){this.bossHpBar.destroy();this.bossHpBar=null;}
      if(this.bossNameText){this.bossNameText.destroy();this.bossNameText=null;}
      this.obstTimer.paused=false;
      Audio.stopBGM();
      Audio.startBGM();
    });
  }

  updateStageProgression(){
    const d=this.distance;let n=0;
    for(let i=STAGES.length-1;i>=0;i--){if(d>=STAGES[i].dist){n=i;break;}}
    if(n!==this.stageIdx){
      this.stageIdx=n;this.scrollSpeed=STAGES[n].speed;this.obstTimer.delay=STAGES[n].obstFreq;
      this.drawBackground();
      const eff=this.getEffScrollSpeed();
      this.obstacles.getChildren().forEach(o=>o.body.setVelocityX(-eff));
      this.enemies.getChildren().forEach(e=>e.body.setVelocityX(-eff));
      this.coins.getChildren().forEach(c=>c.body.setVelocityX(-eff));
      this.powerups.getChildren().forEach(p=>p.body.setVelocityX(-eff));
      Audio.SFX.stageUp();
      const fullName=STAGES[n].name;
      const parts=fullName.split(' — ');
      const stageNum=parts[0];
      const placeName=parts[1]||'';
      this.stageText.setText(stageNum+'\n'+placeName);
      this.stageText.setStyle({fontSize:'36px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF00FF',strokeThickness:6,align:'center'});
      this.stageText.setAlpha(0).setScale(.5);
      this.tweens.add({targets:this.stageText,alpha:1,scale:1,duration:400,ease:'Back.easeOut',onComplete:()=>{this.tweens.add({targets:this.stageText,alpha:0,delay:1500,duration:500});}});
      this.cameras.main.flash(200,255,215,0);
      gameState.stage=n;updateUI();
      this.scheduleStagePowerup(n);
      if(STAGES[n].boss&&!this.bossDefeatedStages[n]){
        this.time.delayedCall(1500,()=>this.spawnBoss(n));
      }
    }
  }

  updatePlayerTexture(){
    const f=this.currentForm;
    const og=this.player.body.blocked.down||this.player.body.touching.down;
    let fn=og?(this.playerFrame===0?'run1':'run2'):'jump';
    const tex=`bro_${f}_${fn}`;
    if(this.player.texture.key!==tex)this.player.setTexture(tex);
  }

  drawPowerBar(){
    const g=this.powerBar;g.clear();
    if(this.currentForm==='normal'||this.powerTimeRemaining<=0)return;
    const pu=POWERUPS[this.currentForm];
    const pct=this.powerTimeRemaining/this.powerDuration;
    const bw=220,bh=10,x=W/2-bw/2,y=100;
    g.fillStyle(0,.7);g.fillRoundedRect(x-2,y-2,bw+4,bh+4,4);
    g.fillStyle(pu.color,1);g.fillRoundedRect(x,y,bw*pct,bh,3);
    g.lineStyle(1,0xFFD700);g.strokeRoundedRect(x-2,y-2,bw+4,bh+4,4);
  }

  exitToTitle(){
    if(this.gameOver)return;
    // Clean up all state
    this.gameOver=true;
    Audio.stopBGM();
    if(this.rainbowCycle){this.rainbowCycle.remove();this.rainbowCycle=null;}
    this.superInvincible=false;
    if(this.starPowers)this.starPowers.getChildren().forEach(s=>{if(s.trailTimer)s.trailTimer.remove();s.destroy();});
    if(this.bossAttackTimer)this.bossAttackTimer.remove();
    if(this.bossSpecialTimer)this.bossSpecialTimer.remove();
    this.blackholeActive=false;
    window.__uwasa_hideInvincible();
    window.__uwasa_activeGameScene=null;
    // Reset game state
    gameState={distance:0,stage:0,lives:3,score:0,coins:0,powersCollected:[]};
    // Go to title
    this.scene.start('Title');
  }

  endGame(){
    this.gameOver=true;this.physics.pause();
    Audio.stopBGM();Audio.SFX.gameover();
    window.__uwasa_hideInvincible();
    window.__uwasa_activeGameScene=null;
    // Clean up super invincible
    if(this.rainbowCycle){this.rainbowCycle.remove();this.rainbowCycle=null;}
    this.superInvincible=false;
    if(this.starPowers)this.starPowers.getChildren().forEach(s=>{if(s.trailTimer)s.trailTimer.remove();s.destroy();});
    this.player.setTexture(`bro_${this.currentForm}_jump`);
    this.player.setTint(0xff6666);
    gameState.distance=this.distance;
    gameState.stage=this.stageIdx;
    gameState.coins=this.coinsCollected;
    this.time.delayedCall(1400,()=>this.scene.start('GameOver'));
  }

  update(time,delta){
    if(this.gameOver)return;
    if(Phaser.Input.Keyboard.JustDown(this.cursors.up)||Phaser.Input.Keyboard.JustDown(this.spaceKey)||Phaser.Input.Keyboard.JustDown(this.wKey))this.doJump();
    if(Phaser.Input.Keyboard.JustDown(this.xKey)||Phaser.Input.Keyboard.JustDown(this.shiftKey))this.doAttack();
    const dt=delta/1000;
    const speedBoost=this.superInvincible?2:1;
    const effSpeed=(this.bossActive?this.scrollSpeed*.15:this.scrollSpeed)*speedBoost;
    this.distance+=(effSpeed/100)*dt;
    gameState.distance=this.distance;
    if(this.player.body.blocked.down||this.player.body.touching.down)this.doubleJumped=false;
    if(this.currentForm!=='normal'){
      this.powerTimeRemaining-=delta;
      if(this.powerTimeRemaining<=0){
        this.currentForm='normal';this.powerTimeRemaining=0;
        showPowerBadge('normal');
        for(let i=0;i<10;i++){const p=this.add.circle(this.player.x,this.player.y,6,0xCCCCCC,.7).setDepth(110);const a=(i/10)*Math.PI*2;this.tweens.add({targets:p,x:this.player.x+Math.cos(a)*60,y:this.player.y+Math.sin(a)*60,alpha:0,duration:500,onComplete:()=>p.destroy()});}
      }
    }
    this.drawPowerBar();
    if(this.bossActive)this.drawBossHpBar();

    // ═══ SUPER INVINCIBLE (hidden command) ═══
    if(this.superInvincible){
      this.superInvincibleTimer-=delta;
      // Update the HTML counter
      window.__uwasa_showInvincible(this.superInvincibleTimer/1000);
      if(this.superInvincibleTimer<=0){
        this.superInvincible=false;
        this.superInvincibleTimer=0;
        window.__uwasa_hideInvincible();
        if(this.rainbowCycle){this.rainbowCycle.remove();this.rainbowCycle=null;}
        if(this.player&&this.player.active)this.player.clearTint();
        // Cleanup remaining starpowers
        this.starPowers.getChildren().forEach(s=>{if(s.trailTimer)s.trailTimer.remove();s.destroy();});
        // Restore normal speeds
        this.refreshAllSpeeds();
        // Resume appropriate BGM
        Audio.stopBGM();
        if(this.bossActive)Audio.startBossBGM();else Audio.startBGM();
        // End-of-invincible fade flash
        this.cameras.main.flash(300,255,255,255);
      }
      // Update starpower positions
      this.starPowers.getChildren().forEach(s=>{if(s.x<-40){if(s.trailTimer)s.trailTimer.remove();s.destroy();}});
    }
    if(this.boss&&this.boss.active&&this.bossActive){
      const bx=this.boss.x,by=this.boss.y;
      const bW=60,bH=90;
      const bl=bx-bW/2,br=bx+bW/2,bt=by-bH/2,bb=by+bH/2;
      this.projectiles.getChildren().forEach(p=>{
        if(!p.active)return;
        if(p.x>bl-15&&p.x<br+15&&p.y>bt-15&&p.y<bb+15){this.hitBossManual(p);}
      });
      this.bossProjectiles.getChildren().forEach(p=>{
        if(!p.active||!p.reflected||p.hasHit)return;
        if(p.x>bl-10&&p.x<br+10&&p.y>bt-10&&p.y<bb+10){this.reflectedHitBossManual(p);}
      });
      if(this.player&&this.player.active){
        const px=this.player.x,py=this.player.y;
        const pW=34,pH=56;
        const pl=px-pW/2,pr=px+pW/2,pt=py-pH/2,pb=py+pH/2;
        if(pl<br&&pr>bl&&pt<bb&&pb>bt){this.playerTouchBossManual();}
      }
    }
    if(this.attackCooldown>0)this.attackCooldown-=delta;
    const og=this.player.body.blocked.down||this.player.body.touching.down;
    if(og){this.playerFrameTimer+=delta;const fd=130-Math.min(this.stageIdx*8,60);if(this.playerFrameTimer>fd){this.playerFrameTimer=0;this.playerFrame=1-this.playerFrame;}}
    this.updatePlayerTexture();
    this.groundTiles.forEach(t=>{t.x-=effSpeed*dt;if(t.x<=-64)t.x+=this.groundTiles.length*64;});
    this.buildings.getChildren().forEach(b=>{b.x-=effSpeed*.3*dt;if(b.x<-120){b.x=W+100;const bt=['building','building2','building3','building4'];b.setTexture(bt[Phaser.Math.Between(0,3)]);}});
    this.clouds.getChildren().forEach(c=>{c.x-=effSpeed*.1*dt;if(c.x<-80){c.x=W+80;c.y=Phaser.Math.Between(60,200);}});
    this.stars.forEach(s=>{s.x-=effSpeed*.05*dt;if(s.x<0){s.x=W;s.y=Phaser.Math.Between(0,240);}});
    this.powerups.getChildren().forEach(p=>{if(p.aura){p.aura.x=p.x;p.aura.y=p.y;}});
    this.updateStageProgression();
    this.obstacles.getChildren().forEach(o=>{if(o.x<-60)o.destroy();});
    this.enemies.getChildren().forEach(e=>{if(e.x<-60)e.destroy();});
    this.coins.getChildren().forEach(c=>{if(c.x<-40)c.destroy();});
    this.powerups.getChildren().forEach(p=>{if(p.x<-40){if(p.aura)p.aura.destroy();p.destroy();}});
    this.projectiles.getChildren().forEach(pr=>{if(pr.x>W+200)pr.destroy();});
    this.bossProjectiles.getChildren().forEach(bp=>{if(bp.x<-60||bp.y>H+40){if(bp.groundCheckTimer)bp.groundCheckTimer.remove();bp.destroy();}});
    this.bossShards.getChildren().forEach(s=>{if(s.x<-30||s.x>W+30||s.y>H+30)s.destroy();});
    updateUI();
  }
}

const SUPABASE_URL = 'https://hwoltvzmsznprsbyrbaj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1JsQKCxHNyH4fGzFUJeEHg_czjaZxPR';

async function sbInsert(data){
  if(!SUPABASE_URL||!SUPABASE_KEY)return null;
  const res=await fetch(SUPABASE_URL+'/rest/v1/scores',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Prefer':'return=representation'
    },
    body:JSON.stringify({...data, game:'uwasa_brothers'})
  });
  return res.ok?await res.json():null;
}

async function sbFetchRanking(){
  if(!SUPABASE_URL||!SUPABASE_KEY)return null;
  const monday=new Date();
  monday.setDate(monday.getDate()-((monday.getDay()+6)%7));
  monday.setHours(0,0,0,0);
  const res=await fetch(
    SUPABASE_URL+'/rest/v1/scores?select=player_name,coins,score,stage&game=eq.uwasa_brothers&created_at=gte.'+monday.toISOString()+'&order=coins.desc&limit=10',
    {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}
  );
  return res.ok?await res.json():null;
}

async function sbFetchLastWeekChampion(){
  if(!SUPABASE_URL||!SUPABASE_KEY)return null;
  const mondayThisWeek=new Date();
  mondayThisWeek.setDate(mondayThisWeek.getDate()-((mondayThisWeek.getDay()+6)%7));
  mondayThisWeek.setHours(0,0,0,0);
  const mondayLastWeek=new Date(mondayThisWeek);
  mondayLastWeek.setDate(mondayLastWeek.getDate()-7);
  try{
    const res=await fetch(
      SUPABASE_URL+'/rest/v1/scores?select=player_name,coins&game=eq.uwasa_brothers&created_at=gte.'+mondayLastWeek.toISOString()+'&created_at=lt.'+mondayThisWeek.toISOString()+'&order=coins.desc&limit=1',
      {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}
    );
    if(!res.ok)return null;
    const data=await res.json();
    return data&&data.length>0?data[0]:null;
  }catch(e){return null;}
}

// ═══ NAME INPUT OVERLAY ═══
function showNameInput(onSubmit, opts){
  opts=opts||{};
  // ★バグ修正: 重複オープン防止
  if(window.__uwasa_nameOverlayOpen)return;
  const existing=document.getElementById('name-overlay');
  if(existing)existing.remove();
  window.__uwasa_nameOverlayOpen=true;

  const title=opts.title||'🎮 GAME OVER 🎮';
  const desc=opts.desc||'名前を入力してランキングに登録しよう！<br>（最大8文字）';
  const defaultName=opts.defaultName||'';
  const skipAllowed=opts.skipAllowed!==false;
  const submitLabel=opts.submitLabel||'✅ ランキングに登録';

  if(!document.getElementById('ni-style')){
    const st=document.createElement('style');
    st.id='ni-style';
    st.textContent=`
      #name-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;align-items:center;justify-content:center;font-family:'Arial Black',sans-serif;}
      #name-box{background:#0a0a1a;border:3px solid #FFD700;border-radius:12px;padding:28px 24px;width:90%;max-width:440px;text-align:center;box-shadow:0 0 40px rgba(255,215,0,.4);}
      #name-box h2{font-size:22px;color:#FFD700;text-shadow:0 0 12px #FFD700;margin-bottom:6px;letter-spacing:2px;}
      #name-box p{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:20px;font-family:Arial,sans-serif;}
      #name-input{width:100%;background:#111;border:2px solid #FFD700;border-radius:8px;padding:12px 16px;font-size:20px;color:#fff;font-family:'Arial Black',sans-serif;letter-spacing:3px;text-align:center;outline:none;box-sizing:border-box;}
      #name-input:focus{border-color:#FF00FF;box-shadow:0 0 16px rgba(255,0,255,.4);}
      #name-submit{margin-top:16px;width:100%;background:#FFD700;border:none;border-radius:8px;padding:14px;font-size:18px;font-family:'Arial Black',sans-serif;color:#000;cursor:pointer;letter-spacing:2px;}
      #name-submit:active{transform:scale(.97);}
      #name-skip{margin-top:10px;background:none;border:none;color:rgba(255,255,255,.35);font-size:12px;font-family:Arial,sans-serif;cursor:pointer;text-decoration:underline;}
    `;
    document.head.appendChild(st);
  }
  const ov=document.createElement('div');
  ov.id='name-overlay';
  ov.innerHTML=`
    <div id="name-box">
      <h2>${title}</h2>
      <p>${desc}</p>
      <input id="name-input" maxlength="8" placeholder="YOUR NAME" autocomplete="off" spellcheck="false" value="${defaultName}">
      <button id="name-submit">${submitLabel}</button>
      ${skipAllowed?'<br><button id="name-skip">スキップ（登録しない）</button>':''}
    </div>
  `;
  document.body.appendChild(ov);
  const inp=document.getElementById('name-input');
  inp.focus();
  if(defaultName)inp.select();
  const submit=()=>{
    const name=(inp.value.trim()||'NONAME').substring(0,8);
    ov.remove();
    window.__uwasa_nameOverlayOpen=false;
    onSubmit(name);
  };
  document.getElementById('name-submit').onclick=submit;
  if(skipAllowed){
    document.getElementById('name-skip').onclick=()=>{
      ov.remove();
      window.__uwasa_nameOverlayOpen=false;
      onSubmit(null);
    };
  }
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
}

class GameOverScene extends Phaser.Scene{
  constructor(){super('GameOver');}

  create(){
    // ★バグ修正: モバイルボタン非表示、オーバーレイクリーンアップ
    window.__uwasa_showMobile(false);
    window.__uwasa_cleanupOverlays();

    const g=this.add.graphics();
    g.fillStyle(0);g.fillRect(0,0,W,H);
    for(let y=0;y<H;y++){const t=y/H;const r=Math.floor(20+40*t),b=Math.floor(20+30*t);g.fillStyle((r<<16)|b,.9);g.fillRect(0,y,W,1);}
    for(let i=0;i<50;i++){const s=this.add.image(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),'star').setAlpha(Phaser.Math.FloatBetween(.3,.9));this.tweens.add({targets:s,alpha:.1,duration:Phaser.Math.Between(600,1800),yoyo:true,repeat:-1});}

    const d=gameState.distance.toFixed(1);
    const sd=STAGES[Math.min(gameState.stage,STAGES.length-1)];
    const pc=gameState.powersCollected.length;
    const finalScore=Math.floor(gameState.distance*10)+gameState.score+(pc*200);
    const finalCoins=gameState.coins||0;

    const go=this.add.text(W/2,44,'GAME OVER',{fontSize:'54px',fontFamily:'Arial Black',color:'#FF2244',stroke:'#000',strokeThickness:7}).setOrigin(.5);
    this.tweens.add({targets:go,scale:{from:.5,to:1},duration:500,ease:'Back.easeOut'});

    const cy=190;
    const card=this.add.graphics();
    card.fillStyle(0,.85);card.fillRoundedRect(W/2-280,cy-80,560,190,12);
    card.lineStyle(3,0xFFD700);card.strokeRoundedRect(W/2-280,cy-80,560,190,12);

    this.add.text(W/2,cy-60,'━━━  RESULT  ━━━',{fontSize:'16px',fontFamily:'Arial Black',color:'#FFD700',letterSpacing:4}).setOrigin(.5);
    const pd=pc>0?gameState.powersCollected.map(p=>POWERUPS[p].emoji).join(' '):'—';
    const rows=[
      {l:'📏 DISTANCE',v:`${d} m`,c:'#FFFFFF'},
      {l:'🎮 STAGE',v:sd.name.split(' — ')[0],c:'#FF00FF'},
      {l:'🪙 COINS',v:`${finalCoins}`,c:'#FFD700'},
      {l:`✨ POWERS (${pc}/10)`,v:pd,c:'#00FFFF'},
      {l:'⭐ SCORE',v:`${finalScore}`,c:'#00FFAA'},
    ];
    rows.forEach((r,i)=>{
      this.add.text(W/2-230,cy-32+i*28,r.l,{fontSize:'14px',fontFamily:'Arial',color:'#AAAAAA'}).setOrigin(0,.5);
      this.add.text(W/2+230,cy-32+i*28,r.v,{fontSize:'17px',fontFamily:'Arial Black',color:r.c}).setOrigin(1,.5);
    });

    let rm='🔥 LEGENDARY RUNNER!',rc='#FFD700';
    if(finalScore<150){rm='💨 BEGINNER BRO';rc='#AAAAAA';}
    else if(finalScore<500){rm='🌿 GETTING STARTED';rc='#00BFFF';}
    else if(finalScore<1500){rm='💜 SHISHA MASTER';rc='#FF00FF';}
    else if(finalScore<3500){rm='⚡ UWASA ELITE';rc='#FFD700';}
    else if(finalScore<7000){rm='🔥 LEGENDARY!';rc='#FFD700';}
    else if(finalScore<15000){rm='🌌 COSMIC GOD 🌌';rc='#FF00FF';}
    else{rm='👑 UWASA OVERLORD 👑';rc='#FF00FF';}
    if(gameState.stage>=29)rm='🏆 STAGE 30 CONQUEROR 🏆';
    this.add.text(W/2,326,rm,{fontSize:'22px',fontFamily:'Arial Black',color:rc,stroke:'#000',strokeThickness:4}).setOrigin(.5);

    this.rankTitle=this.add.text(W/2,360,'🏆 WEEKLY RANKING',{fontSize:'14px',fontFamily:'Arial Black',color:'#FFD700',letterSpacing:2}).setOrigin(.5).setAlpha(0);
    this.rankLines=[];
    for(let i=0;i<5;i++){
      const t=this.add.text(W/2,382+i*22,'',{fontSize:'13px',fontFamily:'Arial',color:'#fff'}).setOrigin(.5).setAlpha(0);
      this.rankLines.push(t);
    }

    this.retryBtn=this.add.text(W/2-110,502,'🔄  RETRY',{fontSize:'20px',fontFamily:'Arial Black',color:'#000',backgroundColor:'#FFD700',padding:{x:18,y:10}}).setOrigin(.5).setInteractive({useHandCursor:true});
    this.titleBtn=this.add.text(W/2+110,502,'🏠  TITLE',{fontSize:'20px',fontFamily:'Arial Black',color:'#000',backgroundColor:'#00BFFF',padding:{x:18,y:10}}).setOrigin(.5).setInteractive({useHandCursor:true});
    this.retryBtn.on('pointerover',()=>this.retryBtn.setScale(1.08));
    this.retryBtn.on('pointerout',()=>this.retryBtn.setScale(1));
    this.titleBtn.on('pointerover',()=>this.titleBtn.setScale(1.08));
    this.titleBtn.on('pointerout',()=>this.titleBtn.setScale(1));

    const doRetry=(e)=>{if(e&&e.stopPropagation)e.stopPropagation();Audio.SFX.click();gameState={distance:0,stage:0,lives:3,score:0,coins:0,powersCollected:[]};window.__uwasa_cleanupOverlays();Audio.startBGM();this.scene.start('Game');};
    const doTitle=(e)=>{if(e&&e.stopPropagation)e.stopPropagation();Audio.SFX.click();window.__uwasa_cleanupOverlays();this.scene.start('Title');};
    this.retryBtn.on('pointerdown',doRetry);
    this.titleBtn.on('pointerdown',doTitle);
    this.input.keyboard.on('keydown-SPACE',doRetry);

    this.add.text(W/2,528,'U.wasano Shisha Bar — 片町',{fontSize:'11px',fontFamily:'Arial',color:'#FFD700',fontStyle:'italic'}).setOrigin(.5);

    this.time.delayedCall(500,async()=>{
      const savedName=getPlayerName();
      if(savedName){
        try{
          await sbInsert({
            player_name:savedName,
            coins:finalCoins,
            score:finalScore,
            distance:parseFloat(d),
            stage:gameState.stage,
            powers_collected:pc
          });
        }catch(e){console.warn('Supabase insert failed:',e);}
        this.showRanking(savedName);
      }else{
        showNameInput(async(playerName)=>{
          if(playerName){
            setPlayerName(playerName);
            try{
              await sbInsert({
                player_name:playerName,
                coins:finalCoins,
                score:finalScore,
                distance:parseFloat(d),
                stage:gameState.stage,
                powers_collected:pc
              });
            }catch(e){console.warn('Supabase insert failed:',e);}
          }
          this.showRanking(playerName);
        },{
          title:'🎮 GAME OVER',
          desc:'名前を入力してランキングに登録！<br>（最大8文字）',
          submitLabel:'✅ 登録',
          skipAllowed:false
        });
      }
    });
  }

  async showRanking(myName){
    this.rankTitle.setAlpha(1);
    let data=null;
    try{ data=await sbFetchRanking(); }catch(e){}
    if(!data||!data.length){
      this.rankLines[0].setText('— ランキングを取得できませんでした —').setAlpha(1).setStyle({color:'#888',fontSize:'11px'});
      return;
    }
    const medals=['🥇','🥈','🥉','4','5'];
    const colors=['#FFD700','#C0C0C0','#CD7F32','#aaa','#aaa'];
    this.tweens.add({targets:this.rankTitle,alpha:1,duration:400});
    data.slice(0,5).forEach((row,i)=>{
      const name=(row.player_name||'???').padEnd(8,' ');
      const coins=row.coins||0;
      const isMine=myName&&row.player_name===myName;
      const t=this.rankLines[i];
      t.setText(`${medals[i]}  ${name}  🪙${coins}`);
      t.setStyle({color:isMine?'#FF00FF':colors[i],fontSize:'13px',fontFamily:'Arial Black'});
      if(isMine)t.setStyle({stroke:'#FFD700',strokeThickness:2});
      this.tweens.add({targets:t,alpha:1,duration:300,delay:i*100});
    });
  }
}
