<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UWASA BROTHERS</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:#000;width:100%;height:100%;overflow:hidden;font-family:'Arial Black',sans-serif;touch-action:none;}
  body{display:flex;align-items:center;justify-content:center;}
  #game-container{position:relative;width:100vw;height:100vh;overflow:hidden;background:#0a0a1a;display:flex;align-items:center;justify-content:center;}
  #phaser-game{width:100%;height:100%;}
  #phaser-game canvas{display:block;image-rendering:auto;-webkit-font-smoothing:antialiased;}
  #ui-overlay{position:absolute;top:0;left:0;right:0;padding:8px 10px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10;gap:6px;}
  #ui-dist-block{order:1;}
  #stage-badge{order:2;}
  /* LIVESはCLOSEボタンとかぶらないよう下にずらす */
  #ui-lives-block{order:3;margin-top:48px;}
  .ui-block{background:rgba(0,0,0,.78);border:2px solid #FFD700;border-radius:6px;padding:4px 8px;color:#FFD700;font-size:9px;font-weight:900;letter-spacing:1px;line-height:1.4;}
  .ui-block .val{color:#fff;font-size:13px;display:block;}
  #stage-badge{background:linear-gradient(135deg,#FF00FF,#9B59B6);border-color:#FF00FF;color:#fff;font-size:12px;text-align:center;box-shadow:0 0 10px #FF00FF66;}
  #power-badge{position:absolute;top:48px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:2px solid #FFD700;border-radius:16px;padding:4px 12px;color:#FFD700;font-size:11px;font-weight:900;letter-spacing:1px;z-index:10;display:none;box-shadow:0 0 15px currentColor;white-space:nowrap;}
  #sound-toggle{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);border:2px solid #FFD700;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;font-size:14px;color:#FFD700;}
  #mobile-controls{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:space-between;padding:0 14px;z-index:15;pointer-events:none;}
  .mctrl{width:68px;height:68px;border-radius:50%;background:rgba(0,0,0,.55);border:2px solid #FFD700;color:#FFD700;font-size:24px;font-weight:900;display:flex;align-items:center;justify-content:center;pointer-events:auto;user-select:none;cursor:pointer;}
  .mctrl:active{background:rgba(255,215,0,.3);transform:scale(.92);}
  #btn-attack{border-color:#FF00FF;color:#FF00FF;}
  @media(min-width:900px) and (min-height:540px){#mobile-controls{display:none;}}
</style>
</head>
<body>
<div id="game-container">
  <div id="ui-overlay">
    <div class="ui-block" id="ui-dist-block"><span>📏</span><span class="val" id="ui-dist">0.0 m</span></div>
    <div class="ui-block" id="stage-badge"><span id="ui-stage">STAGE 1</span></div>
    <div class="ui-block" id="ui-lives-block"><span>❤️</span><span class="val" id="ui-lives">♥♥♥</span></div>
  </div>
  <div id="power-badge"></div>
  <div id="phaser-game"></div>
  <div id="mobile-controls">
    <div class="mctrl" id="btn-jump">⬆</div>
    <div class="mctrl" id="btn-attack">⚡</div>
  </div>

</div>

<script>
// AUDIO
const Audio=(()=>{let ctx=null,mg=null,musg=null,sg=null,en=true,bgm=null;
function init(){if(ctx)return;const A=window.AudioContext||window.webkitAudioContext;ctx=new A();mg=ctx.createGain();mg.gain.value=.5;mg.connect(ctx.destination);musg=ctx.createGain();musg.gain.value=.22;musg.connect(mg);sg=ctx.createGain();sg.gain.value=.7;sg.connect(mg);}
function resume(){if(ctx&&ctx.state==='suspended')ctx.resume();}
function tone(f,d,t='square',v=1,tg=null){if(!ctx||!en)return;tg=tg||sg;const o=ctx.createOscillator(),g=ctx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(v,ctx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);o.connect(g);g.connect(tg);o.start();o.stop(ctx.currentTime+d);}
function sweep(fs,fe,d,t='square',v=.5){if(!ctx||!en)return;const o=ctx.createOscillator(),g=ctx.createGain();o.type=t;o.frequency.setValueAtTime(fs,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(fe,ctx.currentTime+d);g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(v,ctx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);o.connect(g);g.connect(sg);o.start();o.stop(ctx.currentTime+d);}
function noise(d,v=.5,ff=800){if(!ctx||!en)return;const bs=ctx.sampleRate*d,b=ctx.createBuffer(1,bs,ctx.sampleRate),dt=b.getChannelData(0);for(let i=0;i<bs;i++)dt[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=b;const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=ff;const g=ctx.createGain();g.gain.setValueAtTime(v,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);s.connect(f);f.connect(g);g.connect(sg);s.start();}
const SFX={
  jump:()=>{sweep(380,720,.16,'square',.35);setTimeout(()=>sweep(720,900,.08,'square',.2),50);},
  coin:()=>{tone(988,.08,'square',.4);setTimeout(()=>tone(1319,.15,'square',.4),80);},
  hit:()=>{noise(.2,.6,600);sweep(400,80,.3,'sawtooth',.4);},
  gameover:()=>[523,466,415,349,311,277,233].forEach((f,i)=>setTimeout(()=>tone(f,.25,'square',.4),i*130)),
  stageUp:()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.12,'square',.5),i*80)),
  start:()=>[392,523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.1,'square',.45),i*70)),
  click:()=>tone(800,.05,'square',.3),
  powerup:()=>{[523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>tone(f,.15,'square',.45),i*60));setTimeout(()=>tone(2093,.3,'triangle',.4),400);},
  fire:()=>{noise(.35,.6,1200);sweep(800,200,.3,'sawtooth',.4);},
  dragon:()=>{sweep(150,80,.4,'sawtooth',.5);noise(.4,.5,400);setTimeout(()=>tone(60,.3,'triangle',.5),100);},
  devil:()=>{sweep(200,60,.5,'sawtooth',.5);setTimeout(()=>noise(.3,.4,300),100);},
  angel:()=>[1047,1319,1568,2093].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.35),i*50)),
  laser:()=>{sweep(2000,200,.25,'sawtooth',.45);noise(.15,.3,3000);},
  ice:()=>[1568,1319,1047,784].forEach((f,i)=>setTimeout(()=>tone(f,.12,'sine',.35),i*40)),
  thunder:()=>{noise(.3,.7,4000);sweep(2000,100,.25,'sawtooth',.5);},
  shadow:()=>{sweep(100,40,.6,'triangle',.5);noise(.4,.3,200);},
  golden:()=>[659,784,988,1319,1568,2093].forEach((f,i)=>setTimeout(()=>tone(f,.1,'square',.4),i*50)),
  cosmic:()=>{[130,196,262,330,392,523,659,784,988,1319].forEach((f,i)=>setTimeout(()=>tone(f,.15,'sine',.4),i*40));setTimeout(()=>noise(.4,.3,3000),400);},
  bossAppear:()=>{[110,98,87,73].forEach((f,i)=>setTimeout(()=>tone(f,.4,'sawtooth',.5),i*200));setTimeout(()=>noise(.8,.4,200),800);},
  bossThrow:()=>{sweep(300,150,.2,'square',.4);setTimeout(()=>tone(500,.1,'sawtooth',.3),150);},
  bossHurt:()=>{noise(.15,.5,2000);tone(200,.2,'square',.4);},
  bossDefeat:()=>{[523,440,349,293,220,175].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sawtooth',.4),i*150));setTimeout(()=>{[1047,1319,1568,2093].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.4),i*100));},1000);},
  shatter:()=>{noise(.15,.5,4000);setTimeout(()=>noise(.1,.3,3000),80);},
  punch:()=>{tone(300,.06,'square',.4);setTimeout(()=>noise(.08,.3,1500),30);},
  stomp:()=>{tone(180,.1,'sawtooth',.45);setTimeout(()=>tone(90,.15,'triangle',.5),50);},
};
const BM=[{n:659,d:1},{n:784,d:1},{n:880,d:1},{n:784,d:1},{n:659,d:1},{n:587,d:1},{n:523,d:2},{n:587,d:1},{n:659,d:1},{n:784,d:1},{n:659,d:1},{n:587,d:2},{n:523,d:2},{n:698,d:1},{n:880,d:1},{n:1047,d:1},{n:880,d:1},{n:784,d:1},{n:698,d:1},{n:659,d:2},{n:587,d:1},{n:659,d:1},{n:523,d:2},{n:440,d:1},{n:523,d:1},{n:587,d:2}];
const BB=[131,131,131,131,196,196,196,196,175,175,175,175,131,131,196,196];
function startBGM(){if(!ctx||!en||bgm)return;const sm=180;let mi=0,mr=0,bs=0;
bgm=setInterval(()=>{if(!en||!ctx)return;
if(mr<=0){const n=BM[mi%BM.length];if(n){const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=n.n;const d=n.d*sm/1000;g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(.15,ctx.currentTime+.02);g.gain.setValueAtTime(.15,ctx.currentTime+d*.7);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);o.connect(g);g.connect(musg);o.start();o.stop(ctx.currentTime+d);mr=n.d;mi++;}}mr--;
const bn=BB[bs%BB.length];if(bn){const o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=bn;const d=sm/1000*.9;g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(.2,ctx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);o.connect(g);g.connect(musg);o.start();o.stop(ctx.currentTime+d);}
if(bs%2===1)noise(.03,.08,4000);
if(bs%4===0){const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(120,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+.1);g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);o.connect(g);g.connect(musg);o.start();o.stop(ctx.currentTime+.15);}
bs++;},sm);}
function stopBGM(){if(bgm){clearInterval(bgm);bgm=null;}}

// 🌟 INVINCIBILITY BGM (マリオのスター風 - 本物に近い)
// オリジナルの旋律: C#G-C#G-EG-BG (ギャロップリズム)
const STAR_MELODY=[
  // 1小節目 (fast tempo, 16分音符)
  [554,0],[1109,0],[831,1],[554,0],[1109,0],[831,1],[698,0],[1397,0],
  // 2小節目
  [1047,1],[554,0],[1109,0],[831,1],[554,0],[1109,0],[831,1],[698,0],
  // 3小節目 (上昇)
  [1175,0],[932,1],[622,0],[1245,0],[932,1],[622,0],[1245,0],[932,1],
  // 4小節目 (頂点)
  [932,0],[1175,0],[1397,0],[1568,0],[1760,1],[1568,0],[1397,0],[1175,0],
];
// 各音: [freq, isAccent(1=強拍)]

function startStarBGM(){
  if(!ctx||!en||bgm)return;
  const noteDur=85; // 85ms per 16th note = 176BPM相当
  let mi=0;
  bgm=setInterval(()=>{
    if(!en||!ctx)return;
    const note=STAR_MELODY[mi%STAR_MELODY.length];
    const f=note[0],accent=note[1];
    if(f>0){
      const d=(noteDur-10)/1000;
      // メロディ (square + saw)
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(accent?.25:.15,ctx.currentTime+.005);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
      o.connect(g);g.connect(musg);
      o.start();o.stop(ctx.currentTime+d);
      // ハーモニー (5度下)
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.type='square';o2.frequency.value=f*.67;
      g2.gain.setValueAtTime(0,ctx.currentTime);
      g2.gain.linearRampToValueAtTime(accent?.12:.07,ctx.currentTime+.005);
      g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
      o2.connect(g2);g2.connect(musg);
      o2.start();o2.stop(ctx.currentTime+d);
    }
    // ベース (キック+ベース交互)
    if(mi%2===0){
      const bf=mi%4===0?165:220;
      const o3=ctx.createOscillator(),g3=ctx.createGain();
      o3.type='triangle';o3.frequency.value=bf;
      g3.gain.setValueAtTime(.3,ctx.currentTime);
      g3.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
      o3.connect(g3);g3.connect(musg);
      o3.start();o3.stop(ctx.currentTime+.15);
    }
    // ハイハット (裏拍)
    if(mi%2===1){
      const bn=ctx.createBuffer(1,ctx.sampleRate*.03,ctx.sampleRate);
      const bd=bn.getChannelData(0);
      for(let i=0;i<bd.length;i++)bd[i]=(Math.random()*2-1)*.3;
      const bs=ctx.createBufferSource();bs.buffer=bn;
      const bg=ctx.createGain();
      bg.gain.setValueAtTime(.15,ctx.currentTime);
      bg.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.04);
      bs.connect(bg);bg.connect(musg);
      bs.start();
    }
    mi++;
  },noteDur);
}

// 🔊 「うぉぉぉぉぉ！」叫び声風サウンド
function playHypeShout(){
  if(!ctx||!en)return;
  const dur=1.2;
  // ノイズベース（叫び声の息遣い）
  const bn=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
  const bd=bn.getChannelData(0);
  for(let i=0;i<bd.length;i++){
    const t=i/ctx.sampleRate;
    // ピッチが上がっていくモーション
    const env=Math.min(1,t*3)*Math.max(0,1-(t-.3)/(dur-.3))*.8;
    bd[i]=(Math.random()*2-1)*env;
  }
  const bs=ctx.createBufferSource();bs.buffer=bn;
  // バンドパスフィルター（声っぽさ）
  const bp=ctx.createBiquadFilter();
  bp.type='bandpass';bp.frequency.value=800;bp.Q.value=3;
  // ピッチ上昇
  bp.frequency.setValueAtTime(400,ctx.currentTime);
  bp.frequency.exponentialRampToValueAtTime(2000,ctx.currentTime+dur*.7);
  const bg=ctx.createGain();
  bg.gain.setValueAtTime(.4,ctx.currentTime);
  bg.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
  bs.connect(bp);bp.connect(bg);bg.connect(musg);
  bs.start();
  // オシレーター追加（低音の迫力）
  const o=ctx.createOscillator(),og=ctx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(80,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(250,ctx.currentTime+dur*.6);
  o.frequency.exponentialRampToValueAtTime(120,ctx.currentTime+dur);
  og.gain.setValueAtTime(0,ctx.currentTime);
  og.gain.linearRampToValueAtTime(.25,ctx.currentTime+.05);
  og.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
  o.connect(og);og.connect(musg);
  o.start();o.stop(ctx.currentTime+dur);
  // ライザー（テンション爆上げ）
  const o2=ctx.createOscillator(),og2=ctx.createGain();
  o2.type='sawtooth';
  o2.frequency.setValueAtTime(200,ctx.currentTime);
  o2.frequency.exponentialRampToValueAtTime(3000,ctx.currentTime+dur*.8);
  og2.gain.setValueAtTime(0,ctx.currentTime);
  og2.gain.linearRampToValueAtTime(.15,ctx.currentTime+dur*.5);
  og2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
  o2.connect(og2);og2.connect(musg);
  o2.start();o2.stop(ctx.currentTime+dur);
}

// BOSS BGM — heavier, faster, minor-key tension theme
const BOSS_MELODY=[
  // Urgent descending minor riff
  {n:415,d:1},{n:370,d:1},{n:311,d:1},{n:277,d:1}, // Ab G Eb C#
  {n:311,d:1},{n:370,d:1},{n:415,d:2},
  {n:466,d:1},{n:415,d:1},{n:370,d:1},{n:415,d:2}, // Bb Ab G Ab
  // Aggressive motif
  {n:622,d:1},{n:554,d:1},{n:466,d:1},{n:415,d:1},
  {n:370,d:1},{n:415,d:1},{n:466,d:2},
  {n:554,d:1},{n:466,d:1},{n:415,d:1},{n:370,d:2},
  // Climax
  {n:831,d:1},{n:740,d:1},{n:622,d:1},{n:554,d:1},
  {n:466,d:2},{n:415,d:2},
];
const BOSS_BASS=[
  // Lower, tenser bass (C#m pattern)
  138,138,138,138, 116,116,116,116, 138,138,155,155,
  184,184,138,138, 116,116,138,138, 155,155,116,116
];
let bossBgmActive=false;

function startBossBGM(){
  if(!ctx||!en||bgm)return;
  bossBgmActive=true;
  const sm=140; // faster tempo
  let mi=0,mr=0,bs=0;
  bgm=setInterval(()=>{
    if(!en||!ctx)return;
    if(mr<=0){
      const n=BOSS_MELODY[mi%BOSS_MELODY.length];
      if(n){
        // Two oscillators for richer sound — square + sawtooth
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sawtooth';o.frequency.value=n.n;
        const d=n.d*sm/1000;
        g.gain.setValueAtTime(0,ctx.currentTime);
        g.gain.linearRampToValueAtTime(.12,ctx.currentTime+.02);
        g.gain.setValueAtTime(.12,ctx.currentTime+d*.7);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
        o.connect(g);g.connect(musg);
        o.start();o.stop(ctx.currentTime+d);

        // Harmony oscillator (octave)
        const o2=ctx.createOscillator(),g2=ctx.createGain();
        o2.type='square';o2.frequency.value=n.n/2;
        g2.gain.setValueAtTime(0,ctx.currentTime);
        g2.gain.linearRampToValueAtTime(.08,ctx.currentTime+.02);
        g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
        o2.connect(g2);g2.connect(musg);
        o2.start();o2.stop(ctx.currentTime+d);

        mr=n.d;mi++;
      }
    }
    mr--;
    // Heavy bass (triangle + square mix)
    const bn=BOSS_BASS[bs%BOSS_BASS.length];
    if(bn){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square';o.frequency.value=bn;
      const d=sm/1000*.9;
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(.25,ctx.currentTime+.01);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
      o.connect(g);g.connect(musg);
      o.start();o.stop(ctx.currentTime+d);
    }
    // Aggressive hi-hat every step
    if(bs%1===0)noise(.025,.12,5000);
    // Double kick
    if(bs%2===0){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(150,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(45,ctx.currentTime+.08);
      g.gain.setValueAtTime(.35,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.12);
      o.connect(g);g.connect(musg);
      o.start();o.stop(ctx.currentTime+.12);
    }
    // Snare on off-beats
    if(bs%4===2){
      noise(.08,.3,2000);
    }
    bs++;
  },sm);
}
function setEnabled(v){en=v;if(!v){if(mg)mg.gain.value=0;stopBGM();}else{if(mg)mg.gain.value=.5;}}
return{init,resume,SFX,startBGM,startBossBGM,startStarBGM,playHypeShout,stopBGM,setEnabled};})();

let soundOn=true;
window.toggleSound=function(){soundOn=!soundOn;Audio.setEnabled(soundOn);document.getElementById('sound-toggle').textContent=soundOn?'🔊':'🔇';};

// CONFIG
const W=960,H=540,GROUND_Y=440,PLAYER_X=160;

const POWERUPS={
  fire:{emoji:'🔥',name:'FIRE BREATH',color:0xFF5500,glow:'#FF5500'},
  dragon:{emoji:'🐉',name:'DRAGON FORM',color:0x00AA66,glow:'#00FF88'},
  devil:{emoji:'😈',name:'DEVIL MODE',color:0xCC0033,glow:'#FF0066'},
  angel:{emoji:'👼',name:'ANGEL FORM',color:0xFFFFFF,glow:'#FFFFFF'},
  laser:{emoji:'⚡',name:'LASER BEAM',color:0x00FFFF,glow:'#00FFFF'},
  ice:{emoji:'❄️',name:'ICE MAGE',color:0x66DDFF,glow:'#AAEEFF'},
  thunder:{emoji:'⚡',name:'THUNDER GOD',color:0xFFFF00,glow:'#FFFF00'},
  shadow:{emoji:'🌑',name:'SHADOW NINJA',color:0x330033,glow:'#AA00FF'},

};

// ═══════════════════════════════════════════════════════
// BOSS DB — each boss has unique name, HP, colors, attack style
// ═══════════════════════════════════════════════════════
const BOSSES={

function updateUI(){
  document.getElementById('ui-dist').textContent=(gameState.distance||0).toFixed(1)+' m';
  const stageName=STAGES[Math.min(gameState.stage||0,STAGES.length-1)].name;
  // Show short form (just "STAGE X") in top badge
  document.getElementById('ui-stage').textContent=stageName.split(' — ')[0];
  document.getElementById('ui-lives').textContent='♥'.repeat(Math.max(gameState.lives,0))||'✕';
}
function showPowerBadge(form){
  const el=document.getElementById('power-badge');
  if(form==='normal'||!form){el.style.display='none';return;}
  const pu=POWERUPS[form];if(!pu)return;
  el.textContent=`${pu.emoji} ${pu.name}`;el.style.color=pu.glow;el.style.borderColor=pu.glow;el.style.display='block';
}

    // ─── WEEKLY TOP 5 (ゲーム画面の下に直接表示) ───
    const rankY=585;
    // 半透明背景
    const rankBg=this.add.rectangle(W/2,rankY+60,520,130,0x000000,.75).setStrokeStyle(2,0xFFD700);
    rankBg.setDepth(5);
    this.add.text(W/2,rankY,'🏆 WEEKLY TOP 5 🏆',{
      fontSize:'14px',
      fontFamily:'Arial Black',
      color:'#FFD700',
      stroke:'#FF00FF',
      strokeThickness:2,
      letterSpacing:2
    }).setOrigin(.5).setDepth(6);

    // ランキング行
    this.titleRankLines=[];
    for(let i=0;i<5;i++){
      const t=this.add.text(W/2,rankY+24+i*20,'読み込み中...',{
        fontSize:'12px',
        fontFamily:'Arial',
        color:'#AAAAAA'
      }).setOrigin(.5).setDepth(6);
      this.titleRankLines.push(t);
    }

    // ランキングをロード
    sbFetchRanking().then(data=>{
      if(!data){
        this.titleRankLines[0].setText('⚠ ランキングを取得できませんでした').setStyle({color:'#888',fontSize:'11px'});
        for(let i=1;i<5;i++)this.titleRankLines[i].setText('');
        return;
      }
      if(!data.length){
        this.titleRankLines[0].setText('まだ記録なし！').setStyle({color:'#888'});
        this.titleRankLines[1].setText('最初のプレイヤーになろう 🎮').setStyle({color:'#FFD700',fontSize:'11px'});
        for(let i=2;i<5;i++)this.titleRankLines[i].setText('');
        return;
      }
      const medals=['🥇','🥈','🥉','4位','5位'];
      const colors=['#FFD700','#C0C0C0','#CD7F32','#FFFFFF','#FFFFFF'];
      for(let i=0;i<5;i++){
        const row=data[i];
        const t=this.titleRankLines[i];
        if(row){
          const name=(row.player_name||'???').substring(0,8);
          t.setText(`${medals[i]}  ${name}   🪙 ${row.coins||0}`);
          t.setStyle({color:colors[i],fontFamily:'Arial Black',fontSize:'13px',stroke:'#000',strokeThickness:2});
        }else{
          t.setText('—');
          t.setStyle({color:'#444',fontSize:'11px'});
        }
      }
    });

    const refreshNameDisplay=()=>{
      const n=getPlayerName();
      this.playerNameText.setText(n?`🎮 プレイヤー: ${n}`:'');
    };
    refreshNameDisplay();

    changeBtn.on('pointerdown',()=>{
      showNameInput((newName)=>{
        if(newName){
          setPlayerName(newName);
          refreshNameDisplay();
        }
      },{
        title:'✏ 名前を変更',
        desc:'新しい名前を入力してください<br>（最大8文字）',
        defaultName:getPlayerName(),
        submitLabel:'✅ 変更する',
        skipAllowed:false
      });
    });

    const start=()=>{
      // 名前が未設定なら強制入力
      if(!getPlayerName()){
        showNameInput((name)=>{
          if(name){
            setPlayerName(name);
            refreshNameDisplay();
            hideGamePanels();Audio.init();Audio.resume();Audio.SFX.start();setTimeout(()=>Audio.startBGM(),400);this.scene.start('Game');
          }
        },{
          title:'🎮 ようこそ！',
          desc:'プレイヤー名を入力してください<br>（最大8文字 / 後から変更可能）',
          submitLabel:'▶ ゲームスタート！',
          skipAllowed:false
        });
        return;
      }
      hideGamePanels();Audio.init();Audio.resume();Audio.SFX.start();setTimeout(()=>Audio.startBGM(),400);this.scene.start('Game');
    };
    btn.on('pointerdown',start);
    this.input.keyboard.on('keydown-SPACE',start);
    this.input.keyboard.on('keydown-UP',start);
    // タップで開始（ボタン以外の部分）- DOMパネル表示中は無効
    this.input.on('pointerdown',(p)=>{
      // DOMオーバーレイ（名前入力/HOW TO/ランキング）が開いていたら無視
      if(document.getElementById('name-overlay'))return;
      const hp=document.getElementById('howto-panel');
      if(hp&&hp.classList.contains('open'))return;
      const rp=document.getElementById('ranking-panel');
      if(rp&&rp.classList.contains('open'))return;
      if(!btn.getBounds().contains(p.x,p.y)&&!howtoBtn.getBounds().contains(p.x,p.y)&&!rankBtn.getBounds().contains(p.x,p.y)&&!changeBtn.getBounds().contains(p.x,p.y))start();
    });
  }
}

function showHowTo(){createPanelDOM();document.getElementById('howto-panel').classList.add('open');}
function showRankingPanel(){createPanelDOM();document.getElementById('ranking-panel').classList.add('open');loadGameRanking();}
function hideGamePanels(){
  ['howto-panel','ranking-panel'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.classList.remove('open');
  });
}

function switchGameTab(tab){
  document.querySelectorAll('.rtab-btn').forEach(t=>t.classList.remove('on-y'));
  document.getElementById('gtab-'+tab).classList.add('on-y');
  loadGameRanking();
}

async function loadGameRanking(){
  const el=document.getElementById('grank-list');
  if(!el)return;
  el.innerHTML='<div class="rank-empty-g">読み込み中...</div>';
  const data=await sbFetchRanking();
  if(!data){
    el.innerHTML='<div class="rank-empty-g">⚠ Supabase未設定<br>URLとAPIキーを入力すると<br>ランキングが表示されます</div>';
    return;
  }
  if(!data.length){
    el.innerHTML='<div class="rank-empty-g">まだ記録がありません！<br>最初のプレイヤーになろう 🎮</div>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  const colors=['#FFE600','#C0C0C0','#CD7F32','rgba(255,255,255,.65)'];
  el.innerHTML=data.map((row,i)=>{
    const medal=i<3?medals[i]:(i+1)+'位';
    const col=colors[Math.min(i,3)];
    const name=(row.player_name||'???').substring(0,8);
    return `<div class="rank-row-g">
      <span style="font-size:15px;width:26px">${medal}</span>
      <span style="font-size:14px;color:${col};flex:1;margin-left:6px">${name}</span>
      <span style="color:#FFE600;font-size:14px">🪙 ${row.coins||0}</span>
      <span style="color:rgba(255,255,255,.3);font-size:10px;margin-left:7px">ST${(row.stage||0)+1}</span>
    </div>`;
  }).join('');
}

class GameScene extends Phaser.Scene{
  constructor(){super('Game');}
  create(){
    // ゲームUIを表示
    try{
      const ui=document.getElementById('ui-overlay');
      if(ui)ui.style.display='flex';
      const mc=document.getElementById('mobile-controls');
      if(mc)mc.style.display='flex';
    }catch(e){}

    this.stageIdx=0;this.scrollSpeed=STAGES[0].speed;this.distance=0;
    this.lives=gameState.lives;this.gameOver=false;this.invincible=false;
    this.coinsCollected=gameState.coins||0;
    this.currentForm='normal';this.powerTimeRemaining=0;this.powerDuration=12000;this.attackCooldown=0;
    // Higher stages = longer power duration (you'll need it)
    this.getPowerDuration=()=>{
      if(this.stageIdx>=25)return 18000;
      if(this.stageIdx>=20)return 16000;
      if(this.stageIdx>=15)return 14000;
      return 12000;
    };
    this.powerupSpawned={};this.powerupSpawnScheduled={};
    STAGES.forEach((s,i)=>{this.powerupSpawned[i]=false;this.powerupSpawnScheduled[i]=false;});
    this.doubleJumped=false;
    // Boss state
    this.bossActive=false;
    this.bossDefeatedStages={};
    this.boss=null;
    this.bossProjectiles=null;
    this.bossShards=null;

    this.bgGraphics=this.add.graphics().setDepth(-100);
    this.drawBackground();

    this.stars=[];
    for(let i=0;i<50;i++){const st=this.add.image(Phaser.Math.Between(0,W),Phaser.Math.Between(0,240),'star').setScale(Phaser.Math.FloatBetween(.5,1.5)).setAlpha(Phaser.Math.FloatBetween(.3,1)).setDepth(-80);this.stars.push(st);}

    this.buildings=this.add.group();
    const bldgTypes=['building','building2','building3','building4'];
    for(let x=0;x<W+200;x+=90){const ty=bldgTypes[Phaser.Math.Between(0,bldgTypes.length-1)];const b=this.add.image(x,GROUND_Y,ty).setOrigin(0,1).setAlpha(.55).setDepth(-60);b.setScale(Phaser.Math.FloatBetween(.7,1.0));this.buildings.add(b);}

    this.clouds=this.add.group();
    const cks=['cloud_cyan','cloud_yellow','cloud_pink'];
    for(let i=0;i<6;i++){const c=this.add.image(Phaser.Math.Between(0,W),Phaser.Math.Between(60,200),cks[i%3]).setAlpha(.55).setScale(Phaser.Math.FloatBetween(.7,1.3)).setDepth(-70);this.clouds.add(c);}

    this.groundTiles=[];
    for(let x=0;x<W+128;x+=64){const t=this.add.image(x,GROUND_Y,'ground_tile').setOrigin(0,0).setDepth(-40);this.groundTiles.push(t);}

    // Player — sprite at depth 100, origin center
    this.player=this.physics.add.sprite(PLAYER_X,GROUND_Y-60,'bro_normal_run1');
    this.player.setOrigin(.5,.5);
    this.player.setCollideWorldBounds(false);
    this.player.setGravityY(1800);
    this.player.body.setSize(28,56);
    this.player.body.setOffset(10,6);
    this.player.setDepth(100);
    this.player.setScale(1.2);
    this.playerFrame=0;this.playerFrameTimer=0;

    this.groundBody=this.physics.add.staticGroup();
    const gr=this.add.rectangle(W/2,GROUND_Y+20,W*3,40,0,0);
    this.physics.add.existing(gr,true);
    this.groundBody.add(gr);
    this.physics.add.collider(this.player,this.groundBody);

    this.obstacles=this.physics.add.group();
    this.enemies=this.physics.add.group();
    this.coins=this.physics.add.group();
    this.powerups=this.physics.add.group();
    this.projectiles=this.physics.add.group();
    this.bossProjectiles=this.physics.add.group();
    this.bossShards=this.physics.add.group();

    this.physics.add.overlap(this.player,this.obstacles,this.hitObstacle,null,this);
    this.physics.add.overlap(this.player,this.enemies,this.touchEnemy,null,this);
    this.physics.add.overlap(this.player,this.coins,this.collectCoin,null,this);
    this.physics.add.overlap(this.player,this.powerups,this.collectPowerup,null,this);
    this.physics.add.overlap(this.projectiles,this.obstacles,this.projectileHitObstacle,null,this);
    this.physics.add.overlap(this.projectiles,this.enemies,this.projectileHitEnemy,null,this);
    this.physics.add.overlap(this.player,this.bossProjectiles,this.hitBossProjectile,null,this);
    this.physics.add.overlap(this.player,this.bossShards,this.hitBossProjectile,null,this);
    this.physics.add.overlap(this.projectiles,this.bossProjectiles,this.cancelBossProjectile,null,this);

    this.obstTimer=this.time.addEvent({delay:STAGES[0].obstFreq,callback:this.spawnObstacle,callbackScope:this,loop:true});
    this.coinTimer=this.time.addEvent({delay:1500,callback:this.spawnCoin,callbackScope:this,loop:true});

    this.cursors=this.input.keyboard.createCursorKeys();
    this.spaceKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.wKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
    this.xKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);
    this.shiftKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SHIFT);

    const jb=document.getElementById('btn-jump');
    const ab=document.getElementById('btn-attack');
    window.__game_jump=()=>this.doJump();
    window.__game_attack=()=>this.doAttack();

    // ジャンプボタン - 複数イベントで確実に
    if(jb){
      const jumpHandler=(e)=>{
        e.preventDefault();
        e.stopPropagation();
        if(window.__game_jump)window.__game_jump();
      };
      // 既存ハンドラを削除してから登録（シーン再開時対応）
      if(jb._handler){
        jb.removeEventListener('touchstart',jb._handler);
        jb.removeEventListener('mousedown',jb._handler);
        jb.removeEventListener('pointerdown',jb._handler);
      }
      jb._handler=jumpHandler;
      jb.addEventListener('touchstart',jumpHandler,{passive:false});
      jb.addEventListener('mousedown',jumpHandler);
      jb.addEventListener('pointerdown',jumpHandler);
    }

    // 攻撃ボタン - 複数イベントで確実に
    if(ab){
      const attackHandler=(e)=>{
        e.preventDefault();
        e.stopPropagation();
        if(window.__game_attack)window.__game_attack();
      };
      if(ab._handler){
        ab.removeEventListener('touchstart',ab._handler);
        ab.removeEventListener('mousedown',ab._handler);
        ab.removeEventListener('pointerdown',ab._handler);
      }
      ab._handler=attackHandler;
      ab.addEventListener('touchstart',attackHandler,{passive:false});
      ab.addEventListener('mousedown',attackHandler);
      ab.addEventListener('pointerdown',attackHandler);
    }

    // 画面タップ（ボタン以外の部分）
    this.input.on('pointerdown',(p)=>{
      // タップ位置がボタンの真上なら無視（ボタン側で処理）
      const btnRect=jb?jb.getBoundingClientRect():null;
      const abRect=ab?ab.getBoundingClientRect():null;
      if(p.event){
        const ex=p.event.clientX,ey=p.event.clientY;
        if(btnRect&&ex>=btnRect.left&&ex<=btnRect.right&&ey>=btnRect.top&&ey<=btnRect.bottom)return;
        if(abRect&&ex>=abRect.left&&ex<=abRect.right&&ey>=abRect.top&&ey<=abRect.bottom)return;
      }
      if(p.x<W/2)this.doJump();else this.doAttack();
    });

    this.stageText=this.add.text(W/2,H/2-40,'',{fontSize:'56px',fontFamily:'Arial Black',color:'#FF00FF',stroke:'#FFD700',strokeThickness:7}).setOrigin(.5).setAlpha(0).setDepth(200);
    this.powerText=this.add.text(W/2,140,'',{fontSize:'36px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:6}).setOrigin(.5).setAlpha(0).setDepth(200);
    this.powerBar=this.add.graphics().setDepth(150);

    updateUI();showPowerBadge('normal');
    this.scheduleStagePowerup(0);

    // 🌟 隠しコマンド: STAGE表示3回タップ → HP表示3回タップで発動
    this.starMode=false;
    this.starSpawned=false;
    this.stars=this.physics.add.group();
    this.physics.add.overlap(this.player,this.stars,this.collectInvincibilityStar,null,this);

    // 秘密コマンドのトリガー
    this._secretStage=0; // 0:STAGE押し中 1:HP押し中
    this._secretStageCount=0;
    this._secretHpCount=0;
    this._secretLastTap=0;
    const stageEl=document.getElementById('stage-badge');
    const hpEl=document.getElementById('ui-lives-block');
    const triggerSecret=()=>{
      if(this.starSpawned||this.starMode||this.gameOver)return;
      this.spawnInvincibilityStar();
    };
    if(stageEl){
      if(stageEl._secretHandler)stageEl.removeEventListener('click',stageEl._secretHandler);
      stageEl._secretHandler=(e)=>{
        e.stopPropagation();
        const now=Date.now();
        if(now-this._secretLastTap>2000){this._secretStageCount=0;this._secretHpCount=0;}
        this._secretLastTap=now;
        if(this._secretHpCount===0){
          this._secretStageCount++;
          // デバッグ用微小ヒント（視覚には影響なし）
        }else{
          // HP押し中にSTAGE押したらリセット
          this._secretStageCount=1;this._secretHpCount=0;
        }
      };
      stageEl.style.pointerEvents='auto';
      stageEl.style.cursor='pointer';
      stageEl.addEventListener('click',stageEl._secretHandler);
    }
    if(hpEl){
      if(hpEl._secretHandler)hpEl.removeEventListener('click',hpEl._secretHandler);
      hpEl._secretHandler=(e)=>{
        e.stopPropagation();
        const now=Date.now();
        if(now-this._secretLastTap>2000){this._secretStageCount=0;this._secretHpCount=0;return;}
        this._secretLastTap=now;
        if(this._secretStageCount>=3){
          this._secretHpCount++;
          if(this._secretHpCount>=3){
            this._secretStageCount=0;
            this._secretHpCount=0;
            triggerSecret();
          }
        }
      };
      hpEl.style.pointerEvents='auto';
      hpEl.style.cursor='pointer';
      hpEl.addEventListener('click',hpEl._secretHandler);
    }
  }

  spawnInvincibilityStar(){

  activateStarMode(){
    this.starMode=true;
    // BGM切替

    // 🔊 「うぉぉぉぉぉ！」叫び声（星取得の瞬間に激しく）

      this.tweens.add({

    this.starTintTimer=this.time.addEvent({
      delay:80,repeat:-1,
      callback:()=>{
        if(this.player&&this.player.active){
          this.player.setTint(colors[ci%colors.length]);
          ci++;

      }
    });
    // トレイルエフェクト
    this.starTrailTimer=this.time.addEvent({
      delay:60,repeat:-1,
      callback:()=>{
        if(!this.player||!this.player.active)return;
        const trail=this.add.circle(this.player.x,this.player.y,Phaser.Math.Between(8,14),colors[Phaser.Math.Between(0,4)],.6).setDepth(95);
        this.tweens.add({targets:trail,alpha:0,scale:2,duration:500,onComplete:()=>trail.destroy()});
      }
    });
    // 60秒後に終了
    this.time.delayedCall(60000,()=>this.deactivateStarMode());
    // 残り時間カウントダウン (最後の5秒は点滅警告)
    this.time.delayedCall(55000,()=>{
      if(!this.starMode)return;
      const warn=this.add.text(W/2,80,'⚠ 5秒で無敵解除 ⚠',{fontSize:'22px',fontFamily:'Arial Black',color:'#FF0033',stroke:'#FFD700',strokeThickness:4}).setOrigin(.5).setDepth(500);
      this.tweens.add({targets:warn,alpha:.3,duration:250,yoyo:true,repeat:9,onComplete:()=>warn.destroy()});
    });
  }

  deactivateStarMode(){
    if(!this.starMode)return;
    this.starMode=false;
    if(this.starTintTimer)this.starTintTimer.remove();
    if(this.starTrailTimer)this.starTrailTimer.remove();
    if(this.player&&this.player.active)this.player.clearTint();
    Audio.stopBGM();
    if(!this.bossActive)Audio.startBGM();
    else Audio.startBossBGM();
    const txt=this.add.text(W/2,H/2-40,'無敵終了',{fontSize:'28px',fontFamily:'Arial Black',color:'#FFFFFF',stroke:'#000',strokeThickness:4}).setOrigin(.5).setDepth(500).setAlpha(0);
    this.tweens.add({targets:txt,alpha:1,duration:300,yoyo:true,hold:800,onComplete:()=>txt.destroy()});
  }

  drawBackground(){
    const s=STAGES[this.stageIdx],g=this.bgGraphics;g.clear();
    const tc=Phaser.Display.Color.IntegerToColor(s.bgTop),bc=Phaser.Display.Color.IntegerToColor(s.bgBot);

  }

  doJump(){
    if(this.gameOver)return;

    if(og){this.player.setVelocityY(-780);Audio.SFX.jump();this.spawnJumpDust();this.doubleJumped=false;}

  spawnObstacle(){
    if(this.gameOver)return;

    // 50% chance spike obstacle, 50% enemy
    if(Math.random()<.5){
      this.spawnSpike();
    }else{
      this.spawnEnemy();
    }

    // Higher stages: chance of additional spawns
    if(this.stageIdx>=3&&Math.random()<.35){
      this.time.delayedCall(400,()=>{if(!this.gameOver){Math.random()<.5?this.spawnSpike():this.spawnEnemy();}});
    }
    if(this.stageIdx>=6&&Math.random()<.3){
      this.time.delayedCall(700,()=>{if(!this.gameOver)this.spawnEnemy(true);}); // flying
    }
    if(this.stageIdx>=10&&Math.random()<.35){
      this.time.delayedCall(600,()=>{if(!this.gameOver)this.spawnSpike();});
      this.time.delayedCall(1000,()=>{if(!this.gameOver)this.spawnEnemy();});
    }
    if(this.stageIdx>=15&&Math.random()<.4){
      this.time.delayedCall(200,()=>{if(!this.gameOver)this.spawnEnemy(true);});
    }
    if(this.stageIdx>=20&&Math.random()<.5){
      const bursts=Phaser.Math.Between(2,3);
      for(let i=0;i<bursts;i++){
        this.time.delayedCall(300+i*250,()=>{if(!this.gameOver){Math.random()<.5?this.spawnSpike():this.spawnEnemy(Math.random()<.5);}});
      }
    }
    if(this.stageIdx>=25&&Math.random()<.55){
      this.time.delayedCall(200,()=>{if(!this.gameOver)this.spawnSpike();});
      this.time.delayedCall(500,()=>{if(!this.gameOver)this.spawnEnemy(true);});
      this.time.delayedCall(800,()=>{if(!this.gameOver)this.spawnSpike();});
    }
  }

  // Damage-dealing obstacle (cannot be stomped, only destroyed with strong attacks)
  spawnSpike(){
    if(this.gameOver)return;
    const o=this.obstacles.create(W+40,GROUND_Y-13,'obs_spike_wall');
    o.setScale(1.2);
    o.body.setAllowGravity(false);
    o.body.setVelocityX(-this.scrollSpeed);
    o.body.setSize(70,24);
    o.setDepth(50);
    o.isSpike=true;

  // Enemy that can be stomped
  spawnEnemy(forceFlying=false){
    if(this.gameOver)return;
    const types=[
      {key:'enemy_spiked',y:GROUND_Y-22,scale:1.2,hitW:32,hitH:32,flying:false,hp:1,speedMul:1,rolling:true},
      {key:'enemy_coal',y:GROUND_Y-20,scale:1.2,hitW:28,hitH:30,flying:false,hp:2,speedMul:.9,walking:true},
      {key:'enemy_ghost',y:GROUND_Y-100,scale:1.2,hitW:34,hitH:30,flying:true,hp:1,speedMul:.8,floating:true},
      {key:'obs_bat',y:GROUND_Y-130,scale:1.4,hitW:40,hitH:20,flying:true,hp:1,speedMul:1.1,bobbing:true},
    ];
    let pool=types.filter(t=>forceFlying?t.flying:true);
    if(this.stageIdx<2)pool=pool.filter(t=>!t.flying);
    const t=pool[Phaser.Math.Between(0,pool.length-1)];
    const e=this.enemies.create(W+40,t.y,t.key);
    e.setScale(t.scale);
    e.body.setAllowGravity(false);
    e.body.setVelocityX(-this.scrollSpeed*t.speedMul);
    e.body.setSize(t.hitW,t.hitH);
    e.setDepth(50);
    e.hp=t.hp;
    e.enemyType=t.key;

    if(t.rolling){
      this.tweens.add({targets:e,angle:360,duration:500,repeat:-1});
    }
    if(t.floating){
      this.tweens.add({targets:e,y:e.y-20,duration:800,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    }
    if(t.bobbing){
      const range=this.stageIdx>=15?50:30;
      this.tweens.add({targets:e,y:e.y+range,duration:this.stageIdx>=20?500:800,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    }
    if(t.walking){
      this.tweens.add({targets:e,y:e.y-4,duration:250,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    }
  }

  spawnCoin(){
    if(this.gameOver)return;
    const c=Phaser.Math.Between(2,4);
    for(let i=0;i<c;i++){
      const y=GROUND_Y-90-Phaser.Math.Between(0,80);
      const co=this.coins.create(W+20+i*30,y,'coin');
      co.body.setAllowGravity(false);co.body.setVelocityX(-this.scrollSpeed);
      co.setDepth(45);
      this.tweens.add({targets:co,y:y-6,duration:400,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
      this.tweens.add({targets:co,angle:360,duration:800,repeat:-1});
    }
  }

  scheduleStagePowerup(idx){
    if(this.powerupSpawnScheduled[idx]||this.powerupSpawned[idx])return;
    this.powerupSpawnScheduled[idx]=true;
    const d=Phaser.Math.Between(4000,9000);
    this.time.delayedCall(d,()=>{
      if(this.gameOver||this.stageIdx!==idx||this.powerupSpawned[idx])return;
      this.spawnPowerup(idx);
    });
  }

    if(this.powerupSpawned[idx])return;
    this.powerupSpawned[idx]=true;
    const s=STAGES[idx],k=s.powerupKey,pu=POWERUPS[k];
    const y=GROUND_Y-140;
    const it=this.powerups.create(W+30,y,'power_'+k);
    it.setScale(1.6);it.body.setAllowGravity(false);
    it.body.setVelocityX(-this.scrollSpeed);
    it.body.setSize(32,32);it.powerKey=k;it.setDepth(55);
    const au=this.add.circle(it.x,it.y,32,pu.color,.35).setDepth(54);
    it.aura=au;
    this.tweens.add({targets:it,y:y-15,duration:500,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.tweens.add({targets:it,angle:360,duration:3000,repeat:-1});
    this.tweens.add({targets:au,scale:1.6,alpha:.18,duration:700,yoyo:true,repeat:-1});

    const n=this.add.text(W/2,100,'✨ RARE ITEM APPEARED! ✨',{fontSize:'26px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:5}).setOrigin(.5).setDepth(200).setAlpha(0);
    this.tweens.add({targets:n,alpha:1,y:105,duration:400,onComplete:()=>{this.tweens.add({targets:n,alpha:0,delay:1500,duration:500,onComplete:()=>n.destroy()});}});
    Audio.SFX.stageUp();

  collectPowerup(pl,it){
    const k=it.powerKey;

    it.destroy();
    Audio.SFX.powerup();
    this.cameras.main.flash(400,255,215,0);
    this.currentForm=k;this.powerTimeRemaining=this.getPowerDuration();this.powerDuration=this.powerTimeRemaining;
    if(!gameState.powersCollected.includes(k))gameState.powersCollected.push(k);
    const pu=POWERUPS[k];
    showPowerBadge(k);
    this.powerText.setText(`${pu.emoji} ${pu.name} ${pu.emoji}`);
    this.powerText.setAlpha(0).setScale(.3);
    this.tweens.add({targets:this.powerText,alpha:1,scale:1,duration:500,ease:'Back.easeOut',onComplete:()=>{this.tweens.add({targets:this.powerText,alpha:0,delay:1500,duration:500});}});
    for(let i=0;i<24;i++){const p=this.add.circle(this.player.x,this.player.y,Phaser.Math.Between(4,12),pu.color,1).setDepth(110);const a=(i/24)*Math.PI*2;this.tweens.add({targets:p,x:this.player.x+Math.cos(a)*150,y:this.player.y+Math.sin(a)*150,alpha:0,scale:.2,duration:900,onComplete:()=>p.destroy()});}
  }

  projectileHitObstacle(proj,obs){
    // スパイクは攻撃で壊せない！プロジェクタイルだけ消す
    if(obs.isSpike){
      if(proj.active)proj.destroy();
      return;
    }
    const x=obs.x,y=obs.y;obs.destroy();
    if(!['laser','angel','cosmic'].includes(this.currentForm)){if(proj.active)proj.destroy();}
    const pu=POWERUPS[this.currentForm]||{color:0xFFD700};
    for(let i=0;i<14;i++){const p=this.add.circle(x,y,Phaser.Math.Between(3,8),pu.color,.9).setDepth(95);const a=Math.random()*Math.PI*2,sp=Phaser.Math.Between(40,150);this.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scale:.2,duration:500,onComplete:()=>p.destroy()});}
    gameState.score+=25;
    const t=this.add.text(x,y,'+25',{fontSize:'18px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(120);
    this.tweens.add({targets:t,y:y-30,alpha:0,duration:500,onComplete:()=>t.destroy()});
    Audio.SFX.coin();
  }

  hitObstacle(pl,obs){
    if(this.invincible||this.gameOver||this.starMode)return;
    // Spike obstacles are NOT destroyed on contact - they hurt the player
    this.lives--;gameState.lives=this.lives;
    Audio.SFX.hit();
    this.cameras.main.shake(280,.015);
    this.cameras.main.flash(150,255,50,50);
    if(this.lives<=0){this.endGame();return;}
    this.invincible=true;
    this.tweens.add({targets:pl,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{pl.setAlpha(1);this.invincible=false;}});
    updateUI();
  }

  touchEnemy(player,enemy){
    if(this.invincible||this.gameOver||!enemy.active)return;
    // ⭐ STARモード: 触れただけで敵を破壊
    if(this.starMode){
      this.killEnemy(enemy,false);
      gameState.score+=100;
      const txt=this.add.text(enemy.x,enemy.y-30,'+100 ⭐',{fontSize:'18px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF00FF',strokeThickness:3}).setOrigin(.5).setDepth(120);
      this.tweens.add({targets:txt,y:enemy.y-60,alpha:0,duration:600,onComplete:()=>txt.destroy()});
      return;
    }
    // Stomp if falling onto enemy from above
    if(player.body.velocity.y>100&&player.y<enemy.y-10){
      enemy.hp--;
      Audio.SFX.stomp();
      player.setVelocityY(-580); // bounce
      gameState.score+=30;
      // Squash effect
      this.tweens.add({targets:enemy,scaleY:.3,duration:80,yoyo:true});
      if(enemy.hp<=0){
        this.killEnemy(enemy,true);
      }else{
        // Flash red
        enemy.setTint(0xFF6666);
        this.time.delayedCall(120,()=>{if(enemy.active)enemy.clearTint();});
      }
    }else{
      // Side contact damages player
      this.lives--;gameState.lives=this.lives;
      Audio.SFX.hit();
      this.cameras.main.shake(280,.015);
      this.cameras.main.flash(150,255,50,50);
      if(this.lives<=0){this.endGame();return;}
      this.invincible=true;
      this.tweens.add({targets:player,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{player.setAlpha(1);this.invincible=false;}});
      updateUI();
    }
  }

  projectileHitEnemy(proj,enemy){
    if(!enemy.active)return;
    const dmg=proj.damage||1;
    enemy.hp-=dmg;
    if(!['laser','angel','cosmic'].includes(this.currentForm)){
      if(proj.active)proj.destroy();
    }
    if(enemy.hp<=0){
      this.killEnemy(enemy,false);
      gameState.score+=50;
    }else{
      enemy.setTint(0xFF6666);
      this.time.delayedCall(120,()=>{if(enemy.active)enemy.clearTint();});
      const txt=this.add.text(enemy.x,enemy.y-30,`-${dmg}`,{fontSize:'14px',fontFamily:'Arial Black',color:'#FFFFFF',stroke:'#000',strokeThickness:2}).setOrigin(.5).setDepth(120);
      this.tweens.add({targets:txt,y:enemy.y-50,alpha:0,duration:400,onComplete:()=>txt.destroy()});
    }
  }

  killEnemy(enemy,wasStomped){
    const x=enemy.x,y=enemy.y;
    // Explosion particles
    for(let i=0;i<12;i++){
      const p=this.add.circle(x,y,Phaser.Math.Between(3,7),0xFFD700,.9).setDepth(95);
      const a=Math.random()*Math.PI*2,sp=Phaser.Math.Between(40,140);
      this.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scale:.2,duration:500,onComplete:()=>p.destroy()});
    }
    const t=this.add.text(x,y,wasStomped?'+30 STOMP!':'+50 KILL!',{fontSize:'16px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(120);
    this.tweens.add({targets:t,y:y-40,alpha:0,duration:700,onComplete:()=>t.destroy()});
    enemy.destroy();
    Audio.SFX.coin();
  }

  collectCoin(pl,co){
    co.destroy();
    this.coinsCollected++;gameState.coins=this.coinsCollected;gameState.score+=10;
    Audio.SFX.coin();
    const s=this.add.text(co.x,co.y,'+10',{fontSize:'20px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(120);
    this.tweens.add({targets:s,y:s.y-40,alpha:0,scale:1.5,duration:700,onComplete:()=>s.destroy()});
  }

  // ═══ BOSS BATTLE ═══
  spawnBoss(stageIdx){
    if(this.bossActive||this.gameOver)return;
    const bossKey=STAGES[stageIdx].boss;
    const bossData=BOSSES[bossKey];
    if(!bossData)return;
    this.bossActive=true;
    this.bossStageIdx=stageIdx;
    this.bossKey=bossKey;
    this.bossData=bossData;

    // Stop obstacle spawning during boss
    this.obstTimer.paused=true;
    this.obstacles.getChildren().forEach(o=>{
      this.tweens.add({targets:o,alpha:0,duration:300,onComplete:()=>o.destroy()});
    });
    this.enemies.getChildren().forEach(e=>{
      this.tweens.add({targets:e,alpha:0,duration:300,onComplete:()=>e.destroy()});
    });

    Audio.SFX.bossAppear();
    this.cameras.main.shake(600,.015);

    Audio.stopBGM();
    this.time.delayedCall(800,()=>{
      if(this.bossActive)Audio.startBossBGM();
    });

    // Banner with dynamic name & colors
    const banner=this.add.text(W/2,H/2-70,bossData.title,{fontSize:'32px',fontFamily:'Arial Black',color:'#FF0033',stroke:'#FFD700',strokeThickness:5}).setOrigin(.5).setDepth(250).setAlpha(0);
    const nameBanner=this.add.text(W/2,H/2+10,bossData.name,{fontSize:'58px',fontFamily:'Arial Black',color:bossData.nameColor,stroke:bossData.nameStroke,strokeThickness:7,letterSpacing:6}).setOrigin(.5).setDepth(250).setAlpha(0);
    this.tweens.add({targets:banner,alpha:1,scale:{from:2,to:1},duration:600,ease:'Back.easeOut'});
    this.tweens.add({targets:nameBanner,alpha:1,scale:{from:2,to:1},duration:600,delay:200,ease:'Back.easeOut',onComplete:()=>{
      this.tweens.add({targets:[banner,nameBanner],alpha:0,delay:1500,duration:500,onComplete:()=>{banner.destroy();nameBanner.destroy();}});
    }});

    // Dynamic texture per boss
    this.boss=this.add.image(W+80,GROUND_Y-50,`boss_${bossKey}_idle`);
    this.boss.setOrigin(.5,.5);
    this.boss.setDepth(80);
    this.boss.setScale(1.15);
    this.boss.hp=bossData.hp;
    this.boss.maxHp=bossData.hp;
    this.boss.frameIdx=0;
    this.boss.active=true;
    this.bossAnchorX=W-260;
    this.bossAnchorY=GROUND_Y-50;
    this.bossLocked=false;

    this.tweens.add({targets:this.boss,x:this.bossAnchorX,duration:1800,ease:'Cubic.easeOut',onComplete:()=>{
      if(!this.bossActive)return;
      this.bossLocked=true;
      this.startBossAttacks();
    }});

    this.bossIdleTween=this.tweens.add({targets:this.boss,y:GROUND_Y-52,duration:900,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});

    this.bossHpBar=this.add.graphics().setDepth(210);
    this.bossNameText=this.add.text(W/2,28,`⚔ ${bossData.name} ⚔`,{fontSize:'18px',fontFamily:'Arial Black',color:bossData.nameColor,stroke:bossData.nameStroke,strokeThickness:4,letterSpacing:3}).setOrigin(.5).setDepth(211);
  }

  drawBossHpBar(){
    if(!this.bossHpBar||!this.boss)return;
    const g=this.bossHpBar;g.clear();
    const pct=Math.max(0,this.boss.hp/this.boss.maxHp);
    const bw=300,bh=12;
    const x=W/2-bw/2,y=42;
    g.fillStyle(0,.7);g.fillRoundedRect(x-3,y-3,bw+6,bh+6,4);
    // Color transitions red->orange->green based on hp
    let col=0x00FF44;
    if(pct<.33)col=0xFF0033;
    else if(pct<.66)col=0xFFAA00;
    g.fillStyle(col,1);g.fillRoundedRect(x,y,bw*pct,bh,3);
    g.lineStyle(2,0xFFD700);g.strokeRoundedRect(x-3,y-3,bw+6,bh+6,4);
  }

  startBossAttacks(){
    if(!this.bossActive||this.gameOver||!this.boss)return;
    const delay=this.bossData?this.bossData.attackDelay:1500;
    this.bossAttackTimer=this.time.addEvent({
      delay:delay,
      callback:()=>this.bossDoAttack(),
      callbackScope:this,
      loop:true
    });
    this.bossMoveTween=this.tweens.add({
      targets:this.boss,
      y:{from:GROUND_Y-140,to:GROUND_Y-50},
      duration:2500,
      yoyo:true,repeat:-1,ease:'Sine.easeInOut'
    });
    if(this.bossIdleTween){this.bossIdleTween.stop();}
  }

  bossDoAttack(){
    if(!this.bossActive||this.gameOver||!this.boss||!this.boss.active)return;
    const key=this.bossKey;
    this.boss.setTexture(`boss_${key}_throw1`);
    this.time.delayedCall(180,()=>{
      if(!this.boss||!this.boss.active)return;
      this.boss.setTexture(`boss_${key}_throw2`);
      Audio.SFX.bossThrow();
      const types=this.bossData.throwTypes;
      const count=this.bossData.projectileCount||1;
      // Throw multiple projectiles in rapid succession
      for(let i=0;i<count;i++){
        this.time.delayedCall(i*120,()=>{
          if(!this.boss||!this.boss.active)return;
          const type=types[Phaser.Math.Between(0,types.length-1)];
          this.bossThrowObject(type,i);
        });
      }
      this.time.delayedCall(250+count*120,()=>{
        if(this.boss&&this.boss.active)this.boss.setTexture(`boss_${key}_idle`);
      });
    });
  }

  bossThrowObject(type,idx=0){
    if(!this.boss||!this.boss.active)return;
    const texMap={
      plate:'throw_plate', bowl:'throw_bowl', hookah:'throw_hookah',
      skull:'power_devil', dagger:'proj_shadow', bomb:'power_shadow',
      fireball:'proj_fire', lava:'power_fire', meteor:'obs_hookah',
      ice_spike:'proj_ice', snowball:'coin', icicle:'power_ice',
      laser_orb:'power_laser', glitch:'proj_laser', data_shard:'proj_thunder',
      blackhole:'power_cosmic', star:'coin', nebula:'proj_cosmic',
    };
    const tex=texMap[type]||'throw_plate';
    const startX=this.boss.x-60;
    const startY=this.boss.y-20+idx*10;

    const proj=this.bossProjectiles.create(startX,startY,tex);
    proj.setDepth(85);
    proj.body.setAllowGravity(true);
    proj.body.setGravityY(900);
    proj.throwType=type;
    proj.setScale(1.2);
    proj.hasHit=false;
    proj.spawnTime=this.time.now;

    // Aim closer to player with spread
    const targetX=PLAYER_X+Phaser.Math.Between(-60,60);
    const dx=targetX-startX;
    // Vary flight time based on stage (faster in later stages)
    const flightTime=Math.max(.5,.85-this.stageIdx*.01);
    const vx=dx/flightTime;
    const vy=-400-Phaser.Math.Between(0,200);
    proj.body.setVelocityX(vx);
    proj.body.setVelocityY(vy);

    // Spin
    this.tweens.add({targets:proj,angle:720,duration:1200,repeat:-1});
    const sz=type==='plate'?{w:28,h:28}:type==='bowl'?{w:30,h:26}:{w:26,h:26};
    proj.body.setSize(sz.w,sz.h);

    proj.groundCheckTimer=this.time.addEvent({
      delay:20,repeat:-1,
      callback:()=>{
        if(!proj.active)return;
        if(proj.y>=GROUND_Y-14)this.shatterBossObject(proj);
      }
    });
  }

  shatterBossObject(proj){
    if(!proj.active)return;
    const x=proj.x,y=Math.min(proj.y,GROUND_Y-14),type=proj.throwType;
    if(proj.groundCheckTimer)proj.groundCheckTimer.remove();
    proj.destroy();

    Audio.SFX.shatter();
    this.cameras.main.shake(100,.004);

    // Impact flash
    const flash=this.add.circle(x,y,20,0xFFFFFF,.8).setDepth(88);
    this.tweens.add({targets:flash,scale:2,alpha:0,duration:200,onComplete:()=>flash.destroy()});

    // Spawn shards flying in arcs
    const shardCount=type==='plate'?7:type==='bowl'?6:5;
    for(let i=0;i<shardCount;i++){
      const sh=this.bossShards.create(x,y,'shard_'+((i%4)+1));
      sh.setDepth(75);
      sh.body.setAllowGravity(true);
      sh.body.setGravityY(1100);
      sh.setScale(1.2);

      // Fan out — some forward (toward player), some back
      const angle=Phaser.Math.Between(-180,-20)*Math.PI/180; // upward
      const speed=Phaser.Math.Between(200,420);
      sh.body.setVelocityX(Math.cos(angle)*speed);
      sh.body.setVelocityY(Math.sin(angle)*speed);
      sh.body.setSize(8,8);
      sh.tint=type==='bowl'?0x8B4513:type==='plate'?0xFFFFFF:0xFFD700;
      sh.setTint(sh.tint);

      // Spin
      this.tweens.add({targets:sh,angle:Phaser.Math.Between(-720,720),duration:1500});
      // Auto-destroy after 2.5s
      this.time.delayedCall(2500,()=>{if(sh.active)sh.destroy();});
    }

    // Type-specific extras
    if(type==='hookah'){
      // Hookah throws bigger shrapnel + ember puffs
      for(let i=0;i<6;i++){
        const e=this.add.circle(x,y,Phaser.Math.Between(3,8),0xFF6600,.9).setDepth(78);
        const ang=Math.random()*Math.PI*2;
        this.tweens.add({
          targets:e,
          x:x+Math.cos(ang)*Phaser.Math.Between(30,80),
          y:y+Math.sin(ang)*Phaser.Math.Between(30,80),
          alpha:0,scale:.2,duration:600,
          onComplete:()=>e.destroy()
        });
      }
    }
  }

  hitBossProjectile(player,proj){
    if(this.invincible||this.gameOver||this.starMode)return;
    if(proj.groundCheckTimer)proj.groundCheckTimer.remove();
    proj.destroy();
    this.lives--;gameState.lives=this.lives;
    Audio.SFX.hit();
    this.cameras.main.shake(300,.015);
    this.cameras.main.flash(150,255,50,50);
    if(this.lives<=0){this.endGame();return;}
    this.invincible=true;
    this.tweens.add({targets:player,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{player.setAlpha(1);this.invincible=false;}});
    updateUI();
  }

  cancelBossProjectile(playerProj,bossProj){
    if(!bossProj.active)return;
    if(bossProj.reflected)return; // already reflected once

    // REFLECT! Shoot the object back at the boss with extra speed
    if(bossProj.groundCheckTimer)bossProj.groundCheckTimer.remove();
    bossProj.reflected=true;
    bossProj.body.setAllowGravity(false);

    // Calculate direction toward boss
    let targetX=this.boss?this.boss.x:W-200;
    let targetY=this.boss?this.boss.y:H/2;
    const dx=targetX-bossProj.x;
    const dy=targetY-bossProj.y;
    const dist=Math.max(1,Math.hypot(dx,dy));
    const speed=1100;
    bossProj.body.setVelocityX((dx/dist)*speed);
    bossProj.body.setVelocityY((dy/dist)*speed);

    // Visual: tint gold + flash + trail
    bossProj.setTint(0xFFD700);
    const flash=this.add.circle(bossProj.x,bossProj.y,20,0xFFFFFF,.9).setDepth(100);
    this.tweens.add({targets:flash,scale:3,alpha:0,duration:300,onComplete:()=>flash.destroy()});
    this.cameras.main.shake(80,.006);
    Audio.SFX.punch();

    // Reflected trail
    bossProj.trailTimer=this.time.addEvent({
      delay:40,repeat:-1,
      callback:()=>{
        if(!bossProj.active)return;
        const t=this.add.circle(bossProj.x,bossProj.y,5,0xFFD700,.7).setDepth(83);
        this.tweens.add({targets:t,scale:.1,alpha:0,duration:300,onComplete:()=>t.destroy()});
      }
    });

    // Mark damage — reflected projectile deals big damage to boss
    bossProj.reflectDamage=5;

    // Player projectile dies (absorbed into the reflect)
    if(playerProj.active)playerProj.destroy();

    // Extra score for parry
    gameState.score+=20;
    const txt=this.add.text(bossProj.x,bossProj.y-20,'PARRY!',{fontSize:'20px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF00FF',strokeThickness:4}).setOrigin(.5).setDepth(220);
    this.tweens.add({targets:txt,y:bossProj.y-50,alpha:0,duration:600,onComplete:()=>txt.destroy()});
  }

  // Boss voice lines (Japanese "ouch" reactions)
  bossShout(intensity){
    if(!this.boss||!this.boss.active)return;
    if(this.bossLastShout&&Date.now()-this.bossLastShout<500)return;
    this.bossLastShout=Date.now();

    const data=this.bossData||BOSSES.ryosuke;
    let pool;
    if(intensity>=3)pool=data.shoutHeavy;
    else if(intensity>=2)pool=data.shoutMid;
    else pool=data.shoutLight;
    const line=pool[Phaser.Math.Between(0,pool.length-1)];

    const bubble=this.add.container(this.boss.x,this.boss.y-80).setDepth(230);
    const text=this.add.text(0,0,line,{
      fontSize:'18px',
      fontFamily:'Arial Black',
      color:'#000000',
      backgroundColor:'#FFFFFF',
      padding:{x:10,y:6}
    }).setOrigin(.5);
    const pointer=this.add.triangle(0,text.displayHeight/2+4,-6,0,6,0,0,8,0xFFFFFF).setOrigin(.5,0);
    bubble.add([text,pointer]);

    bubble.setScale(.3);
    this.tweens.add({
      targets:bubble,scale:1,
      duration:200,ease:'Back.easeOut',
      onComplete:()=>{
        this.tweens.add({targets:bubble,x:bubble.x+3,duration:40,yoyo:true,repeat:5});
        this.tweens.add({
          targets:bubble,alpha:0,y:bubble.y-20,
          delay:900,duration:400,
          onComplete:()=>bubble.destroy()
        });
      }
    });
  }

  reflectedHitBoss(proj,boss){
    if(!boss.active||!proj.reflected||proj.hasHit)return;
    proj.hasHit=true; // prevent multi-hit
    const dmg=proj.reflectDamage||5;
    boss.hp-=dmg;
    Audio.SFX.bossHurt();

    if(proj.trailTimer)proj.trailTimer.remove();
    if(proj.groundCheckTimer)proj.groundCheckTimer.remove();

    const imp=this.add.circle(proj.x,proj.y,30,0xFFD700,1).setDepth(220);
    this.tweens.add({targets:imp,scale:4,alpha:0,duration:400,onComplete:()=>imp.destroy()});
    this.cameras.main.shake(300,.018);
    this.cameras.main.flash(200,255,215,0);

    boss.setTint(0xFF3333);
    this.time.delayedCall(180,()=>{if(boss.active)boss.clearTint();});
    // No x-knockback - keep boss in position
    this.tweens.add({targets:boss,alpha:.5,duration:80,yoyo:true});

    proj.destroy();

    const txt=this.add.text(boss.x,boss.y-60,`-${dmg} BOOMERANG!`,{fontSize:'22px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF00FF',strokeThickness:5}).setOrigin(.5).setDepth(221);
    this.tweens.add({targets:txt,y:boss.y-110,alpha:0,duration:900,onComplete:()=>txt.destroy()});

    gameState.score+=100;

    // BOSS SHOUTS - heavy intensity for reflected hits
    this.bossShout(3);

    if(boss.hp<=0){this.defeatBoss();}
  }

  hitBossManual(proj){
    if(!this.boss||!this.boss.active)return;
    const boss=this.boss;
    // Throttle per-projectile to avoid multi-frame hit
    if(proj.lastBossHit&&this.time.now-proj.lastBossHit<300)return;
    proj.lastBossHit=this.time.now;

    const dmg=proj.damage||1;
    boss.hp-=dmg;
    Audio.SFX.bossHurt();

    boss.setTint(0xFF5555);
    this.time.delayedCall(100,()=>{if(boss.active)boss.clearTint();});

    const txt=this.add.text(boss.x,boss.y-60,`-${dmg}`,{fontSize:'20px',fontFamily:'Arial Black',color:'#FF3344',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(220);
    this.tweens.add({targets:txt,y:boss.y-100,alpha:0,duration:600,onComplete:()=>txt.destroy()});

    if(!['laser','angel','cosmic'].includes(this.currentForm)){
      if(proj.active)proj.destroy();
    }

    const intensity=dmg>=3?2:1;
    this.bossShout(intensity);

    if(boss.hp<=0)this.defeatBoss();
  }

  reflectedHitBossManual(proj){
    if(!this.boss||!this.boss.active||proj.hasHit)return;
    proj.hasHit=true;
    const boss=this.boss;
    const dmg=proj.reflectDamage||5;
    boss.hp-=dmg;
    Audio.SFX.bossHurt();

    if(proj.trailTimer)proj.trailTimer.remove();
    if(proj.groundCheckTimer)proj.groundCheckTimer.remove();

    const imp=this.add.circle(proj.x,proj.y,30,0xFFD700,1).setDepth(220);
    this.tweens.add({targets:imp,scale:4,alpha:0,duration:400,onComplete:()=>imp.destroy()});
    this.cameras.main.shake(300,.018);
    this.cameras.main.flash(200,255,215,0);

    boss.setTint(0xFF3333);
    this.time.delayedCall(180,()=>{if(boss.active)boss.clearTint();});
    this.tweens.add({targets:boss,alpha:.5,duration:80,yoyo:true});

    proj.destroy();

    const txt=this.add.text(boss.x,boss.y-60,`-${dmg} BOOMERANG!`,{fontSize:'22px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF00FF',strokeThickness:5}).setOrigin(.5).setDepth(221);
    this.tweens.add({targets:txt,y:boss.y-110,alpha:0,duration:900,onComplete:()=>txt.destroy()});

    gameState.score+=100;
    this.bossShout(3);

    if(boss.hp<=0)this.defeatBoss();
  }

  playerTouchBossManual(){
    if(!this.boss||!this.boss.active||this.invincible||this.gameOver)return;
    // Touch cooldown
    if(this.bossTouchCooldown&&this.time.now-this.bossTouchCooldown<500)return;
    this.bossTouchCooldown=this.time.now;

    const player=this.player,boss=this.boss;
    // Stomp if falling onto boss from above
    if(player.body.velocity.y>100&&player.y<boss.y-20){
      boss.hp-=3;
      Audio.SFX.bossHurt();
      player.setVelocityY(-600);
      boss.setTint(0xFF5555);
      this.time.delayedCall(100,()=>{if(boss.active)boss.clearTint();});
      const txt=this.add.text(boss.x,boss.y-60,'-3 STOMP!',{fontSize:'18px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(220);
      this.tweens.add({targets:txt,y:boss.y-100,alpha:0,duration:700,onComplete:()=>txt.destroy()});
      this.bossShout(2);
      if(boss.hp<=0)this.defeatBoss();
    }else{
      // Side contact = damage to player (not boss)
      this.lives--;gameState.lives=this.lives;
      Audio.SFX.hit();
      this.cameras.main.shake(300,.015);
      this.cameras.main.flash(150,255,50,50);
      if(this.lives<=0){this.endGame();return;}
      this.invincible=true;
      // Push PLAYER back (not boss!)
      player.setVelocityX(-200);
      player.setVelocityY(-350);
      this.tweens.add({targets:player,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{
        player.setAlpha(1);this.invincible=false;
        if(player.body)player.body.setVelocityX(0);
      }});
      updateUI();
    }
  }

  hitBoss(proj,boss){
    if(!this.bossActive||!boss.active)return;
    // Throttle piercing projectiles so they don't deal damage every frame
    if(proj.lastBossHit&&this.time.now-proj.lastBossHit<300)return;
    proj.lastBossHit=this.time.now;
    const dmg=proj.damage||1;
    boss.hp-=dmg;
    Audio.SFX.bossHurt();

    // Flash boss red
    boss.setTint(0xFF5555);
    this.time.delayedCall(100,()=>{if(boss.active)boss.clearTint();});

    // Damage number
    const txt=this.add.text(boss.x,boss.y-60,`-${dmg}`,{fontSize:'20px',fontFamily:'Arial Black',color:'#FF3344',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(220);
    this.tweens.add({targets:txt,y:boss.y-100,alpha:0,duration:600,onComplete:()=>txt.destroy()});

    // Remove non-piercing projectiles
    if(!['laser','angel','cosmic'].includes(this.currentForm)){
      if(proj.active)proj.destroy();
    }

    // BOSS SHOUTS - intensity based on damage
    const intensity=dmg>=3?2:1;
    this.bossShout(intensity);

    if(boss.hp<=0){
      this.defeatBoss();
    }
  }

  playerTouchBoss(player,boss){
    if(!this.bossActive||!boss.active||this.invincible||this.gameOver)return;
    // Stomp if player is falling down onto boss
    if(player.body.velocity.y>100&&player.y<boss.y-20){
      boss.hp-=3;
      Audio.SFX.bossHurt();
      player.setVelocityY(-600);
      boss.setTint(0xFF5555);
      this.time.delayedCall(100,()=>{if(boss.active)boss.clearTint();});
      const txt=this.add.text(boss.x,boss.y-60,'-3 STOMP!',{fontSize:'18px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(220);
      this.tweens.add({targets:txt,y:boss.y-100,alpha:0,duration:700,onComplete:()=>txt.destroy()});
      this.bossShout(2);
      if(boss.hp<=0){this.defeatBoss();}
    }else{
      // Side contact = damage
      this.lives--;gameState.lives=this.lives;
      Audio.SFX.hit();
      this.cameras.main.shake(300,.015);
      this.cameras.main.flash(150,255,50,50);
      if(this.lives<=0){this.endGame();return;}
      this.invincible=true;
      // Knock player back
      player.setVelocityX(-300);player.setVelocityY(-400);
      this.tweens.add({targets:player,alpha:.2,duration:100,yoyo:true,repeat:8,onComplete:()=>{player.setAlpha(1);this.invincible=false;this.player.setVelocityX(0);}});
      updateUI();
    }
  }

  defeatBoss(){
    if(!this.bossActive||!this.boss)return;
    const boss=this.boss;
    this.bossActive=false;
    this.bossLocked=false;
    boss.active=false;
    this.bossDefeatedStages[this.bossStageIdx]=true;

    if(this.bossAttackTimer)this.bossAttackTimer.remove();
    if(this.bossMoveTween)this.bossMoveTween.stop();

    Audio.SFX.bossDefeat();

    // Final shout (dynamic)
    const defeatLines=(this.bossData&&this.bossData.shoutDefeat)||['もう無理…','負けた…'];
    const line=defeatLines[Phaser.Math.Between(0,defeatLines.length-1)];
    const bubble=this.add.container(boss.x,boss.y-80).setDepth(230);
    const text=this.add.text(0,0,line,{fontSize:'20px',fontFamily:'Arial Black',color:'#000',backgroundColor:'#FFFFFF',padding:{x:10,y:6}}).setOrigin(.5);
    const pointer=this.add.triangle(0,text.displayHeight/2+4,-6,0,6,0,0,8,0xFFFFFF).setOrigin(.5,0);
    bubble.add([text,pointer]);
    bubble.setScale(.3);
    this.tweens.add({targets:bubble,scale:1,duration:300,ease:'Back.easeOut'});
    this.tweens.add({targets:bubble,alpha:0,delay:1500,duration:400,onComplete:()=>bubble.destroy()});

    // Clear all boss projectiles
    this.bossProjectiles.getChildren().forEach(p=>{if(p.groundCheckTimer)p.groundCheckTimer.remove();p.destroy();});
    this.bossShards.getChildren().forEach(s=>s.destroy());

    // Boss defeat animation
    this.tweens.add({
      targets:boss,
      y:boss.y+20,alpha:.5,angle:{from:0,to:180},
      duration:800,
      ease:'Cubic.easeIn'
    });
    // Explosion particles
    for(let i=0;i<40;i++){
      const p=this.add.circle(boss.x,boss.y,Phaser.Math.Between(4,10),[0xFFD700,0xFF0033,0xFFFFFF,0xFF00FF][i%4],1).setDepth(200);
      const a=(i/40)*Math.PI*2;
      this.tweens.add({
        targets:p,
        x:boss.x+Math.cos(a)*Phaser.Math.Between(100,250),
        y:boss.y+Math.sin(a)*Phaser.Math.Between(100,250),
        alpha:0,scale:.1,duration:1200,
        onComplete:()=>p.destroy()
      });
    }
    this.cameras.main.shake(500,.02);
    this.cameras.main.flash(400,255,255,0);

    // Victory text
    const bossName=(this.bossData&&this.bossData.name)||'BOSS';
    const win=this.add.text(W/2,H/2-40,`${bossName} DEFEATED!`,{fontSize:'42px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF0033',strokeThickness:6}).setOrigin(.5).setDepth(250).setAlpha(0);
    this.tweens.add({targets:win,alpha:1,scale:{from:.5,to:1.2},duration:500,ease:'Back.easeOut',onComplete:()=>{
      this.tweens.add({targets:win,alpha:0,scale:1.4,delay:1500,duration:500,onComplete:()=>win.destroy()});
    }});

    // Score bonus
    gameState.score+=1000;
    const sc=this.add.text(W/2,H/2+20,'+1000 BONUS!',{fontSize:'26px',fontFamily:'Arial Black',color:'#00FFAA',stroke:'#000',strokeThickness:4}).setOrigin(.5).setDepth(250).setAlpha(0);
    this.tweens.add({targets:sc,alpha:1,y:H/2+10,duration:600,delay:400,onComplete:()=>{
      this.tweens.add({targets:sc,alpha:0,delay:1500,duration:500,onComplete:()=>sc.destroy()});
    }});

    // Remove boss after animation
    this.time.delayedCall(1200,()=>{
      if(boss)boss.destroy();
      if(this.bossHpBar){this.bossHpBar.destroy();this.bossHpBar=null;}
      if(this.bossNameText){this.bossNameText.destroy();this.bossNameText=null;}
      // Resume obstacle spawning
      this.obstTimer.paused=false;
      // Back to normal BGM
      Audio.stopBGM();
      Audio.startBGM();
    });
  }

  updateStageProgression(){
    const d=this.distance;let n=0;
    for(let i=STAGES.length-1;i>=0;i--){if(d>=STAGES[i].dist){n=i;break;}}
    if(n!==this.stageIdx){
      this.stageIdx=n;this.scrollSpeed=STAGES[n].speed;this.obstTimer.delay=STAGES[n].obstFreq;
      this.drawBackground();
      this.obstacles.getChildren().forEach(o=>o.body.setVelocityX(-this.scrollSpeed));
      this.enemies.getChildren().forEach(e=>e.body.setVelocityX(-this.scrollSpeed));
      this.coins.getChildren().forEach(c=>c.body.setVelocityX(-this.scrollSpeed));
      this.powerups.getChildren().forEach(p=>p.body.setVelocityX(-this.scrollSpeed));
      if(this.stars)this.stars.getChildren().forEach(s=>s.body.setVelocityX(-this.scrollSpeed));
      Audio.SFX.stageUp();
      const fullName=STAGES[n].name;
      const parts=fullName.split(' — ');
      const stageNum=parts[0];
      const placeName=parts[1]||'';
      this.stageText.setText(stageNum+'\n'+placeName);
      this.stageText.setStyle({fontSize:'36px',fontFamily:'Arial Black',color:'#FFD700',stroke:'#FF00FF',strokeThickness:6,align:'center'});
      this.stageText.setAlpha(0).setScale(.5);
      this.tweens.add({targets:this.stageText,alpha:1,scale:1,duration:400,ease:'Back.easeOut',onComplete:()=>{this.tweens.add({targets:this.stageText,alpha:0,delay:1500,duration:500});}});
      this.cameras.main.flash(200,255,215,0);
      gameState.stage=n;updateUI();
      this.scheduleStagePowerup(n);
      // Trigger boss if stage has one and not yet defeated
      if(STAGES[n].boss&&!this.bossDefeatedStages[n]){
        this.time.delayedCall(1500,()=>this.spawnBoss(n));
      }
    }
  }

  updatePlayerTexture(){
    const f=this.currentForm;
    const og=this.player.body.blocked.down||this.player.body.touching.down;
    let fn=og?(this.playerFrame===0?'run1':'run2'):'jump';
    const tex=`bro_${f}_${fn}`;
    if(this.player.texture.key!==tex)this.player.setTexture(tex);
  }

  drawPowerBar(){
    const g=this.powerBar;g.clear();
    if(this.currentForm==='normal'||this.powerTimeRemaining<=0)return;
    const pu=POWERUPS[this.currentForm];
    const pct=this.powerTimeRemaining/this.powerDuration;
    const bw=220,bh=10,x=W/2-bw/2,y=100;
    g.fillStyle(0,.7);g.fillRoundedRect(x-2,y-2,bw+4,bh+4,4);
    g.fillStyle(pu.color,1);g.fillRoundedRect(x,y,bw*pct,bh,3);
    g.lineStyle(1,0xFFD700);g.strokeRoundedRect(x-2,y-2,bw+4,bh+4,4);
  }

  endGame(){
    this.gameOver=true;this.physics.pause();
    Audio.stopBGM();Audio.SFX.gameover();
    this.player.setTexture(`bro_${this.currentForm}_jump`);
    this.player.setTint(0xff6666);
    // コインを確実に保存
    gameState.distance=this.distance;
    gameState.stage=this.stageIdx;
    gameState.coins=this.coinsCollected;
    this.time.delayedCall(1400,()=>this.scene.start('GameOver'));
  }

  update(time,delta){
    if(this.gameOver)return;
    if(Phaser.Input.Keyboard.JustDown(this.cursors.up)||Phaser.Input.Keyboard.JustDown(this.spaceKey)||Phaser.Input.Keyboard.JustDown(this.wKey))this.doJump();
    if(Phaser.Input.Keyboard.JustDown(this.xKey)||Phaser.Input.Keyboard.JustDown(this.shiftKey))this.doAttack();
    const dt=delta/1000;
    // Slow scroll during boss fight
    const effSpeed=this.bossActive?this.scrollSpeed*.15:this.scrollSpeed;
    this.distance+=(effSpeed/100)*dt;
    gameState.distance=this.distance;

    if(this.player.body.blocked.down||this.player.body.touching.down)this.doubleJumped=false;

    if(this.currentForm!=='normal'){
      this.powerTimeRemaining-=delta;
      if(this.powerTimeRemaining<=0){
        this.currentForm='normal';this.powerTimeRemaining=0;
        showPowerBadge('normal');
        for(let i=0;i<10;i++){const p=this.add.circle(this.player.x,this.player.y,6,0xCCCCCC,.7).setDepth(110);const a=(i/10)*Math.PI*2;this.tweens.add({targets:p,x:this.player.x+Math.cos(a)*60,y:this.player.y+Math.sin(a)*60,alpha:0,duration:500,onComplete:()=>p.destroy()});}
      }
    }
    this.drawPowerBar();
    if(this.bossActive)this.drawBossHpBar();
    // Manual boss hit detection (boss is plain image, not physics body)
    if(this.boss&&this.boss.active&&this.bossActive){
      const bx=this.boss.x,by=this.boss.y;
      const bW=60,bH=90; // hit box size
      const bl=bx-bW/2,br=bx+bW/2,bt=by-bH/2,bb=by+bH/2;

      // Player projectiles vs boss
      this.projectiles.getChildren().forEach(p=>{
        if(!p.active)return;
        if(p.x>bl-15&&p.x<br+15&&p.y>bt-15&&p.y<bb+15){
          this.hitBossManual(p);
        }
      });
      // Reflected boss projectiles vs boss
      this.bossProjectiles.getChildren().forEach(p=>{
        if(!p.active||!p.reflected||p.hasHit)return;
        if(p.x>bl-10&&p.x<br+10&&p.y>bt-10&&p.y<bb+10){
          this.reflectedHitBossManual(p);
        }
      });
      // Player touches boss (stomp or side hit)
      if(this.player&&this.player.active){
        const px=this.player.x,py=this.player.y;
        const pW=34,pH=56;
        const pl=px-pW/2,pr=px+pW/2,pt=py-pH/2,pb=py+pH/2;
        if(pl<br&&pr>bl&&pt<bb&&pb>bt){
          this.playerTouchBossManual();
        }
      }
    }
    if(this.attackCooldown>0)this.attackCooldown-=delta;

    const og=this.player.body.blocked.down||this.player.body.touching.down;
    if(og){this.playerFrameTimer+=delta;const fd=130-Math.min(this.stageIdx*8,60);if(this.playerFrameTimer>fd){this.playerFrameTimer=0;this.playerFrame=1-this.playerFrame;}}
    this.updatePlayerTexture();

    this.groundTiles.forEach(t=>{t.x-=effSpeed*dt;if(t.x<=-64)t.x+=this.groundTiles.length*64;});
    this.buildings.getChildren().forEach(b=>{b.x-=effSpeed*.3*dt;if(b.x<-120){b.x=W+100;const bt=['building','building2','building3','building4'];b.setTexture(bt[Phaser.Math.Between(0,3)]);}});
    this.clouds.getChildren().forEach(c=>{c.x-=effSpeed*.1*dt;if(c.x<-80){c.x=W+80;c.y=Phaser.Math.Between(60,200);}});
    this.stars.forEach(s=>{s.x-=effSpeed*.05*dt;if(s.x<0){s.x=W;s.y=Phaser.Math.Between(0,240);}});

    this.powerups.getChildren().forEach(p=>{if(p.aura){p.aura.x=p.x;p.aura.y=p.y;}});
    this.updateStageProgression();

    this.obstacles.getChildren().forEach(o=>{if(o.x<-60)o.destroy();});
    this.enemies.getChildren().forEach(e=>{if(e.x<-60)e.destroy();});
    this.coins.getChildren().forEach(c=>{if(c.x<-40)c.destroy();});
    this.powerups.getChildren().forEach(p=>{if(p.x<-40){if(p.aura)p.aura.destroy();p.destroy();}});
    this.projectiles.getChildren().forEach(pr=>{if(pr.x>W+200)pr.destroy();});
    this.bossProjectiles.getChildren().forEach(bp=>{if(bp.x<-60||bp.y>H+40){if(bp.groundCheckTimer)bp.groundCheckTimer.remove();bp.destroy();}});
    this.bossShards.getChildren().forEach(s=>{if(s.x<-30||s.x>W+30||s.y>H+30)s.destroy();});
    // 🌟 invincibility star cleanup & aura follow
    if(this.stars){
      this.stars.getChildren().forEach(st=>{
        if(st.aura){st.aura.x=st.x;st.aura.y=st.y;}
        if(st.x<-60){if(st.aura)st.aura.destroy();st.destroy();}
      });
    }

    updateUI();
  }
}
